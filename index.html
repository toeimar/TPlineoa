    // ============================================================================
    // CUSTOMERS VIEW
    // ============================================================================
    function CustomersView({ user, customers, updateCustomer, deleteCustomer }) {
      const [activeTab, setActiveTab] = useState('ทั้งหมด');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedCustomer, setSelectedCustomer] = useState(null);

      const myCustomers = customers.filter(c=>c.agent_id===user.id);
      const filtered = myCustomers.filter(c=>{
        const matchSearch=(c.name||'').toLowerCase().includes(searchTerm.toLowerCase())||(c.phone||'').includes(searchTerm);
        let matchStatus=false;
        if(activeTab==='ทั้งหมด') matchStatus=true;
        else if(activeTab==='ขาดการติดต่อ'){
          const diff=c.lastContact?Math.ceil((new Date()-new Date(c.lastContact))/(1000*60*60*24)):0;
          matchStatus=diff>30&&c.status!=='ปิดการขาย';
        } else matchStatus=c.status===activeTab;
        return matchSearch&&matchStatus;
      });

      return (
        <div className="space-y-6 lg:space-y-8 fade-up">
          <div className="flex flex-col md:flex-row justify-between md:items-end gap-4 mb-2">
            <div>
              <h2 className="text-3xl lg:text-4xl font-black text-slate-800 flex items-center gap-3"><Icon name="database" className="text-emerald-500" size={36}/> ฐานข้อมูลลูกค้า</h2>
              <p className="text-slate-500 font-bold mt-1 uppercase tracking-widest text-xs">ค้นหา กรอง และจัดการข้อมูลลูกค้าในมือคุณ</p>
            </div>
            <div className="flex gap-3 w-full md:w-auto">
              <div className="relative flex-1 md:w-72"><Icon name="magnifying-glass" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" size={18}/><input type="text" placeholder="ค้นหาชื่อ, เบอร์โทร..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full pl-12 pr-5 py-3 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none shadow-sm font-black text-sm"/></div>
              <button onClick={()=>exportToCSV(filtered,`Customers_${user.name}.csv`)} className="bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white border-2 border-emerald-200 hover:border-emerald-500 px-4 py-3 rounded-2xl font-black shadow-sm transition flex items-center justify-center gap-2 whitespace-nowrap" title="Export CSV"><Icon name="file-csv" size={20}/><span className="hidden sm:inline text-sm">Export</span></button>
            </div>
          </div>

          <div className="flex overflow-x-auto custom-scrollbar gap-2 pb-3">
            {['ทั้งหมด',...STATUS_LIST,'ขาดการติดต่อ'].map(tab=>{
              let count=0;
              if(tab==='ทั้งหมด') count=myCustomers.length;
              else if(tab==='ขาดการติดต่อ') count=myCustomers.filter(c=>{const diff=c.lastContact?Math.ceil((new Date()-new Date(c.lastContact))/(1000*60*60*24)):0;return diff>30&&c.status!=='ปิดการขาย';}).length;
              else count=myCustomers.filter(c=>c.status===tab).length;
              return (
                <button key={tab} onClick={()=>setActiveTab(tab)} className={`px-5 py-3 rounded-2xl font-black whitespace-nowrap transition-all border-2 text-sm ${activeTab===tab?(tab==='ขาดการติดต่อ'?'bg-red-500 text-white border-red-500 shadow-xl transform -translate-y-1':'dow-accent text-white border-transparent shadow-xl transform -translate-y-1'):'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                  {tab} <span className={`ml-2 px-2.5 py-0.5 rounded-lg text-xs font-black ${activeTab===tab?'bg-white/20 text-white':'bg-slate-100 text-slate-500'}`}>{count}</span>
                </button>
              );
            })}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 lg:gap-8">
            {filtered.map((c,ci)=>(
              <div key={c.id} className={`bg-white rounded-[2rem] p-6 lg:p-8 border-2 border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all relative overflow-hidden group fade-up`} style={{animationDelay:`${ci*0.04}s`}}>
                <div className={`absolute top-0 right-0 w-20 h-20 rounded-bl-full -mr-3 -mt-3 opacity-20 ${c.status==='ปิดการขาย'?'bg-emerald-500':c.status==='ลีดใหม่'?'bg-blue-500':'bg-orange-500'}`}></div>
                <div className="flex justify-between items-start mb-5 relative z-10">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center font-black text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors text-lg">{(c.name||'?').charAt(0)}</div>
                    <div><h3 className="font-black text-lg text-slate-800">{c.name}</h3><p className="text-sm text-slate-500 flex items-center gap-1.5 mt-0.5 font-bold"><Icon name="phone" size={12}/>{c.phone}</p></div>
                  </div>
                </div>
                <div className="mb-5"><span className={`inline-block px-3 py-1 rounded-xl text-xs font-black border-2 uppercase tracking-widest ${c.status==='ปิดการขาย'?'bg-emerald-50 border-emerald-200 text-emerald-700':c.status==='ลีดใหม่'?'bg-blue-50 border-blue-200 text-blue-700':c.status==='เสนอแบบ'?'bg-purple-50 border-purple-200 text-purple-700':'bg-orange-50 border-orange-200 text-orange-700'}`}>{c.status}</span></div>
                <div className="space-y-2 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                  <div className="flex justify-between text-sm border-b border-slate-200 pb-2"><span className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">นัดล่าสุด</span><span className="font-black text-slate-800 text-sm">{c.appointmentDate?toBuddhistYear(c.appointmentDate):'-'}</span></div>
                  <div className="flex justify-between text-sm border-b border-slate-200 pb-2"><span className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">AI Score</span><span className="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-600 text-base">{c.ai_score||0}/100</span></div>
                  <div className="flex justify-between text-sm items-center"><span className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">แผนที่สนใจ</span><span className="font-black text-blue-600 truncate max-w-[130px] text-right text-sm">{c.interestedPlan||'-'}</span></div>
                </div>
                <button onClick={()=>setSelectedCustomer(c)} className="w-full py-3 bg-white hover:bg-blue-50 text-blue-600 font-black rounded-2xl transition border-2 border-slate-200 hover:border-blue-300 flex items-center justify-center gap-2 text-sm">ดู / แก้ไขข้อมูล <Icon name="caret-right" size={16}/></button>
              </div>
            ))}
            {filtered.length===0 && <div className="col-span-full bg-white p-16 rounded-[3rem] text-center border-2 border-slate-100"><Icon name="database" size={64} className="mx-auto text-slate-200 mb-5"/><h3 className="text-2xl font-black text-slate-600">ไม่พบข้อมูลลูกค้า</h3></div>}
          </div>

          {selectedCustomer && <CustomerModal customer={selectedCustomer} onClose={()=>setSelectedCustomer(null)} onSave={updateCustomer} onDelete={deleteCustomer}/>}
        </div>
      );
    }

    // ============================================================================
    // CUSTOMER MODAL
    // ============================================================================
    function CustomerModal({ customer, onClose, onSave, onDelete }) {
      const [formData, setFormData] = useState({...customer});
      const [isAddingPolicy, setIsAddingPolicy] = useState(false);
      const [newPolicy, setNewPolicy] = useState({planName:'',policyNo:'',cycle:'รายปี',contractDate:'',endDate:'',premium:''});
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [aiInsight, setAiInsight] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(false);
      const [newlyAddedPoliciesForAlert, setNewlyAddedPoliciesForAlert] = useState([]);
      const [newCareNote, setNewCareNote] = useState('');
      const [lightboxSrc, setLightboxSrc] = useState(null);
      const [activeAttachCategory, setActiveAttachCategory] = useState('general');
      const fileInputRef = useRef(null);
      const [leadSources] = useState(getLeadSources());

      const ATTACH_CATEGORIES = [
        { key: 'general',    label: 'ทั่วไป',        icon: 'image',        color: 'text-amber-600',  bg: 'bg-amber-50',  border: 'border-amber-200' },
        { key: 'id_card',    label: 'บัตรประชาชน',   icon: 'identification-card', color: 'text-blue-600', bg: 'bg-blue-50',   border: 'border-blue-200' },
        { key: 'policy_doc', label: 'กรมธรรม์',      icon: 'file-text',    color: 'text-emerald-600',bg: 'bg-emerald-50', border: 'border-emerald-200'},
        { key: 'health',     label: 'ผลตรวจสุขภาพ', icon: 'heart',        color: 'text-red-600',    bg: 'bg-red-50',    border: 'border-red-200' },
        { key: 'finance',    label: 'เอกสารการเงิน', icon: 'money',        color: 'text-purple-600', bg: 'bg-purple-50', border: 'border-purple-200' },
      ];

      const handleChange = (e) => {
        const {name,value,type,checked}=e.target;
        const newVal=type==='checkbox'?checked:value;
        if(name==='dob') setFormData(prev=>({...prev,[name]:newVal,age:calculateAge(newVal)}));
        else setFormData(prev=>({...prev,[name]:newVal}));
      };

      const handleSave = () => {
        if(formData.status==='ปิดการขาย'&&customer.status!=='ปิดการขาย') formData.closedDate=getTodayStr();
        if(!formData.lastContact) formData.lastContact=getTodayStr();
        onSave(formData, newlyAddedPoliciesForAlert); onClose();
      };

      const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        const newAttachments = [];
        for(const file of files){
          if(!file.type.startsWith('image/')) continue;
          const b64 = await toBase64(file);
          newAttachments.push({ name: file.name, data: b64, date: getTodayStr(), category: activeAttachCategory, size: file.size });
        }
        setFormData(prev => ({ ...prev, attachments: [...(prev.attachments||[]), ...newAttachments] }));
      };

      const removeAttachment = (idx) => { setFormData(prev=>({...prev,attachments:(prev.attachments||[]).filter((_,i)=>i!==idx)})); };
      const getAttachByCategory = (cat) => (formData.attachments||[]).filter(a => a.category === cat || (!a.category && cat === 'general'));

      const handleAddPolicy = () => {
        if(!newPolicy.planName||!newPolicy.contractDate) return alert("กรุณากรอกชื่อแผนและวันทำสัญญา");
        const parsedPremium=Number(newPolicy.premium||0);
        const nextRenewal = getNextRenewalDate(newPolicy.contractDate, newPolicy.cycle);
        const policyToAdd={...newPolicy,premium:parsedPremium,nextRenewal};
        setFormData(prev=>({...prev,premium:Number(prev.premium||0)+parsedPremium,policies:[...(prev.policies||[]),policyToAdd]}));
        setNewlyAddedPoliciesForAlert(prev=>[...prev,policyToAdd]);
        setIsAddingPolicy(false);
        setNewPolicy({planName:'',policyNo:'',cycle:'รายปี',contractDate:'',endDate:'',premium:''});
      };

      const handleAddCareNote = () => {
        if(!newCareNote.trim()) return alert("กรุณากรอกรายละเอียดการติดต่อ");
        const newHistory=[...(formData.careHistory||[]),{date:getTodayStr(),note:newCareNote.trim()}];
        setFormData(prev=>({...prev,careHistory:newHistory,lastContact:getTodayStr()}));
        setNewCareNote('');
      };

      const generateAiInsight = () => {
        setIsAiLoading(true);
        setTimeout(()=>{
          let insight="";
          if(formData.status==='ปิดการขาย') insight=`AI (Aftercare): ลูกค้าปิดการขายแผน ${formData.interestedPlan} ไปแล้ว แนะนำให้รักษาสัมพันธ์และนำเสนอแผนควบการลงทุนเพิ่มเติมในปีหน้า`;
          else if(formData.status==='นัดหมาย') insight=`AI (Closing Strategy): ลูกค้ามีรายได้ ${formData.income} และสนใจแผน ${formData.interestedPlan} มีโอกาสปิดการขาย 85% เตรียมข้อมูลเรื่องภาษีไปนำเสนอเพิ่มเติม`;
          else insight=`AI วิเคราะห์: ลูกค้ามีสถานะ ${formData.status} แนะนำให้ส่งบทความสั้นๆ ทาง Line (${formData.lineId||'เบอร์โทร'}) ก่อนโทรคุย`;
          setAiInsight(insight); setIsAiLoading(false);
        },1500);
      };

      return (
        <>
          <Lightbox src={lightboxSrc} onClose={()=>setLightboxSrc(null)}/>
          <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-2 sm:p-6">
            <div className="bg-white rounded-[2rem] lg:rounded-[3rem] shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden fade-up">
              <div className="px-6 lg:px-10 py-4 lg:py-6 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                <div><h2 className="text-2xl lg:text-3xl font-black text-slate-800">{formData.name}</h2><p className="text-slate-400 font-bold uppercase tracking-widest text-xs mt-0.5">จัดการข้อมูลและอัปเดตสถานะการขาย</p></div>
                <button onClick={onClose} className="text-slate-400 hover:bg-slate-100 p-3 rounded-2xl transition"><Icon name="x" size={22}/></button>
              </div>

              <div className="flex-1 overflow-y-auto p-4 lg:p-10 space-y-8 custom-scrollbar bg-slate-50/50">
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
                  <div className="lg:col-span-2 space-y-8">
                    {/* QUICK STATUS */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 bg-white p-5 lg:p-8 rounded-[1.5rem] border border-slate-100 shadow-sm">
                      <div className="space-y-2 col-span-2 lg:col-span-1"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ปรับสถานะ</label><select name="status" value={formData.status} onChange={handleChange} className="w-full px-4 py-3 border-2 border-blue-200 rounded-2xl bg-blue-50 font-black text-blue-800 outline-none">{STATUS_LIST.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ยอดขายรวม</label><input type="number" name="premium" value={formData.premium} onChange={handleChange} className="w-full px-4 py-3 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-800"/></div>
                      <div className="space-y-2"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">วันนัดหมาย</label><input type="date" name="appointmentDate" value={formData.appointmentDate} onChange={handleChange} className="w-full px-4 py-3 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-700"/></div>
                      <div className="space-y-2">
                        <label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ติดต่อล่าสุด</label>
                        <div className="flex gap-2">
                          <input type="date" name="lastContact" value={formData.lastContact||''} onChange={handleChange} className="w-full px-3 py-3 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-700 text-sm"/>
                          <button type="button" onClick={()=>setFormData(prev=>({...prev,lastContact:getTodayStr()}))} className="bg-blue-50 border-2 border-blue-100 text-blue-600 px-3 rounded-2xl font-black hover:bg-blue-100 transition" title="วันนี้"><Icon name="arrows-clockwise" size={18}/></button>
                        </div>
                      </div>
                    </div>

                    {/* EDITABLE DETAILS */}
                    <div className="bg-white rounded-[1.5rem] p-5 lg:p-8 border border-slate-100 shadow-sm">
                      <h3 className="font-black text-slate-800 mb-5 text-xl border-b-2 border-slate-100 pb-3 flex items-center gap-3"><Icon name="user" size={24} className="text-blue-500"/> ข้อมูลรายละเอียดลูกค้า</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">ชื่อ-นามสกุล</label><input type="text" name="name" value={formData.name||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">เบอร์โทร</label><input type="text" name="phone" value={formData.phone||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">Line ID</label><input type="text" name="lineId" value={formData.lineId||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">เพศ</label><select name="gender" value={formData.gender||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"><option value="Male">ชาย</option><option value="Female">หญิง</option></select></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">วันเกิด (ค.ศ.)</label><input type="date" name="dob" value={formData.dob||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">อายุ (ปี)</label><input type="number" name="age" value={formData.age||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">อาชีพ</label><input type="text" name="occupation" value={formData.occupation||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">รายได้ต่อเดือน</label><select name="income" value={formData.income||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"><option>ต่ำกว่า 15,000</option><option>15,000 - 30,000</option><option>30,000 - 50,000</option><option>50,000 - 100,000</option><option>100,000+</option></select></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">แผนที่สนใจ</label><input type="text" name="interestedPlan" value={formData.interestedPlan||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black text-blue-600"/></div>
                        <div className="space-y-1"><label className="block text-xs font-black text-slate-400">แหล่งที่มา</label><select name="leadSource" value={formData.leadSource||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black">{leadSources.map(s=><option key={s}>{s}</option>)}</select></div>
                        <div className="lg:col-span-3 space-y-1"><label className="block text-xs font-black text-slate-400">หมายเหตุเพิ่มเติม</label><textarea name="note" value={formData.note||''} onChange={handleChange} rows={3} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-bold" placeholder="บันทึกข้อมูลสำคัญ..."/></div>
                      </div>
                      <div className="mt-6 space-y-4 border-t-2 border-slate-100 pt-5">
                        <label className="flex items-center gap-4 bg-purple-50 p-5 rounded-2xl border-2 border-purple-200 cursor-pointer shadow-inner">
                          <input type="checkbox" name="hasOldPolicy" checked={formData.hasOldPolicy||false} onChange={handleChange} className="w-5 h-5 text-purple-600 rounded-lg"/>
                          <span className="font-black text-purple-900">ลูกค้ามีประกันเดิมอยู่แล้ว</span>
                        </label>
                        {formData.hasOldPolicy && (
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-5 rounded-3xl border-2 border-slate-200 shadow-sm">
                            <div><label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">เบี้ยประกันเดิม (ต่อปี)</label><input type="number" name="oldPremium" value={formData.oldPremium||''} onChange={handleChange} className="w-full px-4 py-3 border-2 border-slate-200 rounded-xl outline-none font-black"/></div>
                            <div><label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">รายละเอียดกรมธรรม์เดิม</label><input type="text" name="oldPolicyDetails" value={formData.oldPolicyDetails||''} onChange={handleChange} placeholder="เช่น สุขภาพเหมาจ่าย AIA" className="w-full px-4 py-3 border-2 border-slate-200 rounded-xl outline-none font-black"/></div>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* MULTI-CATEGORY IMAGE ATTACHMENTS */}
                    <div className="bg-amber-50/60 rounded-[1.5rem] p-5 lg:p-8 border-2 border-amber-200">
                      <div className="flex justify-between items-center mb-4">
                        <h3 className="font-black text-amber-800 text-xl flex items-center gap-3"><Icon name="folder-open" size={26}/> แนบเอกสาร/ภาพ (หลายประเภท)</h3>
                        <button type="button" onClick={()=>fileInputRef.current?.click()} className="px-4 py-2.5 bg-amber-500 text-white font-black rounded-xl hover:bg-amber-600 transition flex items-center gap-2 shadow-md text-sm"><Icon name="upload-simple" size={16}/> อัปโหลด</button>
                      </div>
                      <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleImageUpload} className="hidden"/>
                      <div className="flex overflow-x-auto gap-2 pb-2 mb-4">
                        {ATTACH_CATEGORIES.map(cat => {
                          const count = getAttachByCategory(cat.key).length;
                          return (
                            <button key={cat.key} onClick={()=>setActiveAttachCategory(cat.key)}
                              className={`flex items-center gap-2 px-4 py-2 rounded-xl font-black text-xs whitespace-nowrap border-2 transition-all ${activeAttachCategory===cat.key?`${cat.bg} ${cat.border} ${cat.color} shadow-sm`:'bg-white border-slate-200 text-slate-500'}`}>
                              <Icon name={cat.icon} size={14}/>{cat.label}
                              {count > 0 && <span className={`px-1.5 py-0.5 rounded-full text-[10px] font-black ${activeAttachCategory===cat.key?'bg-white text-slate-700':'bg-slate-100'}`}>{count}</span>}
                            </button>
                          );
                        })}
                      </div>
                      {(() => {
                        const catFiles = getAttachByCategory(activeAttachCategory);
                        const catInfo = ATTACH_CATEGORIES.find(c => c.key === activeAttachCategory);
                        if (catFiles.length === 0) return (
                          <div className={`border-2 border-dashed ${catInfo.border} rounded-2xl p-8 text-center cursor-pointer hover:opacity-80 transition`} onClick={()=>fileInputRef.current?.click()}>
                            <Icon name={catInfo.icon} size={40} className={`mx-auto ${catInfo.color} mb-2 opacity-50`}/>
                            <p className={`${catInfo.color} font-bold text-sm`}>คลิกเพื่ออัปโหลด{catInfo.label}</p>
                          </div>
                        );
                        const globalIndexes = (formData.attachments||[]).map((a, gi) => ({a, gi})).filter(({a}) => a.category === activeAttachCategory || (!a.category && activeAttachCategory === 'general'));
                        return (
                          <div className="flex flex-wrap gap-3">
                            {globalIndexes.map(({a, gi}) => (
                              <div key={gi} className="relative group">
                                <img src={a.data} alt={a.name} className="attach-thumb" onClick={()=>setLightboxSrc(a.data)}/>
                                <button onClick={()=>removeAttachment(gi)} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs font-black opacity-0 group-hover:opacity-100 transition flex items-center justify-center">✕</button>
                                <p className="text-[10px] text-slate-500 text-center mt-1 max-w-[80px] truncate font-bold">{a.date}</p>
                              </div>
                            ))}

    // ============================================================================
    // ANALYTICS VIEW
    // ============================================================================
    function AnalyticsView({ customers }) {
      const currentMonth=new Date().getMonth(); const currentYear=new Date().getFullYear();
      const closedThisMonth=customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getMonth()===currentMonth);
      const revThisMonth=closedThisMonth.reduce((acc,c)=>acc+Number(c.premium||0),0);
      const avgCase=closedThisMonth.length?Math.round(revThisMonth/closedThisMonth.length):0;
      const convRate=customers.length?Math.round((customers.filter(c=>c.status==='ปิดการขาย').length/customers.length)*100):0;
      const closedThisYear=customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getFullYear()===currentYear);
      const revThisYear=closedThisYear.reduce((acc,c)=>acc+Number(c.premium||0),0);
      const monthlyData=new Array(12).fill(0);
      closedThisYear.forEach(c=>{monthlyData[new Date(c.closedDate).getMonth()]+=Number(c.premium||0);});
      const bestMonthVal=Math.max(...monthlyData); const bestMonthIndex=monthlyData.indexOf(bestMonthVal);
      const monthNames=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const bestMonthName=bestMonthVal>0?monthNames[bestMonthIndex]:'-';
      const prevMonthRev=currentMonth>0?monthlyData[currentMonth-1]:0;
      let growth=0; if(prevMonthRev>0) growth=Math.round(((revThisMonth-prevMonthRev)/prevMonthRev)*100); else if(revThisMonth>0) growth=100;
      const kpis=[
        {title:'รายได้เดือนนี้',val:formatCurrency(revThisMonth),color:'text-emerald-600',bg:'bg-emerald-50',border:'border-emerald-100'},
        {title:'รายได้รวมทั้งปี',val:formatCurrency(revThisYear),color:'text-indigo-600',bg:'bg-indigo-50',border:'border-indigo-100'},
        {title:'เคสที่ปิดได้ (ด)',val:`${closedThisMonth.length} เคส`,color:'text-blue-600',bg:'bg-blue-50',border:'border-blue-100'},
        {title:'เฉลี่ยต่อเคส (ด)',val:formatCurrency(avgCase),color:'text-purple-600',bg:'bg-purple-50',border:'border-purple-100'},
        {title:'Conversion Rate',val:`${convRate}%`,color:'text-orange-600',bg:'bg-orange-50',border:'border-orange-100'},
        {title:'Best Month',val:bestMonthName,color:'text-pink-600',bg:'bg-pink-50',border:'border-pink-100'},
        {title:'Growth (YoM)',val:`${growth>0?'+'+growth:growth}%`,color:growth>=0?'text-emerald-600':'text-red-600',bg:growth>=0?'bg-emerald-50':'bg-red-50',border:growth>=0?'border-emerald-100':'border-red-100'},
      ];
      const chartData=STATUS_LIST.map(s=>({name:s,count:customers.filter(c=>c.status===s).length}));
      return (
        <div className="space-y-8 fade-up">
          <div><h2 className="text-3xl lg:text-4xl font-black text-slate-800 flex items-center gap-3"><Icon name="trend-up" className="text-pink-500" size={36}/> Analytics & KPI</h2><p className="text-slate-500 font-bold mt-1 uppercase tracking-widest text-xs">วิเคราะห์ผลงาน สถิติรายได้ และการเติบโตของคุณ</p></div>
          <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 lg:gap-6">
            {kpis.map((k,i)=>(
              <div key={i} className={`p-5 lg:p-8 rounded-[2rem] border-2 ${k.border} ${k.bg} shadow-sm hover:shadow-md transition-all transform hover:-translate-y-1 fade-up`} style={{animationDelay:`${i*0.05}s`}}>
                <p className="text-[10px] lg:text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">{k.title}</p>
                <h3 className={`text-xl lg:text-3xl font-black ${k.color}`}>{k.val}</h3>
              </div>
            ))}
          </div>
          <div className="bg-white p-6 lg:p-10 rounded-[2.5rem] shadow-sm border border-slate-100"><h3 className="font-black text-slate-800 mb-2 text-xl">จำนวนลูกค้าในแต่ละขั้นตอน</h3><CSSBarChart data={chartData}/></div>
        </div>
      );
    }

    function RankingView({ users, customers, currentUser }) {

        const rev=customers.filter(c=>c.agent_id===u.id&&c.status==='ปิดการขาย').reduce((acc,c)=>acc+Number(c.premium||0),0);
        const taskCount=customers.filter(c=>c.agent_id===u.id&&c.status!=='ปิดการขาย').length;
        return {...u,rev,taskCount};
      }).sort((a,b)=>b.rev-a.rev);

      const maxTaskCount = Math.max(...ranking.map(u=>u.taskCount), 1);

                      <span className="font-black text-white uppercase tracking-wider text-sm italic">{u.name.toUpperCase()}{u.id===currentUser.id&&<span className="text-[10px] bg-indigo-500 text-white px-2 py-0.5 rounded-full ml-2 not-italic">คุณ</span>}</span>

          </div>

          {/* Revenue Ranking */}
          <div className="bg-white rounded-[2.5rem] shadow-xl p-8 lg:p-10">
            <h3 className="font-black text-slate-700 text-lg mb-5 flex items-center gap-2"><Icon name="currency-dollar" size={24} className="text-yellow-500"/> อันดับยอดขาย</h3>
            {ranking.map((u,idx)=>(
              <div key={u.id} className={`flex items-center justify-between p-5 mb-4 rounded-3xl border-2 transition-all hover:-translate-y-1 hover:shadow-lg ${idx===0?'bg-gradient-to-r from-yellow-50 to-orange-50 border-yellow-200':'bg-slate-50 border-slate-100'}`}>

                  <div><p className="font-black text-slate-800 text-xl">{u.name}{u.id===currentUser.id&&<span className="text-[10px] bg-blue-600 text-white px-2.5 py-0.5 rounded-full ml-2 shadow-sm align-middle uppercase tracking-widest">คุณ</span>}</p></div>
                </div>

    // ============================================================================
    // AI ASSISTANT VIEW
    // ============================================================================
    function AIAssistantView() {
      const [inputText,setInputText]=useState('');
      const [messages,setMessages]=useState([]);
      const [isLoading,setIsLoading]=useState(false);
      const messagesEndRef=useRef(null);
      useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages,isLoading]);
      const handleSend=async()=>{
        if(!inputText.trim()||isLoading) return;
        const userMsg=inputText.trim(); setInputText('');
        setMessages(prev=>[...prev,{role:'user',text:userMsg}]); setIsLoading(true);
        try {
          const apiKey="AIzaSyDbHog1AJB9nmrPvQtBefDIeF-uy_y4XjU";
          const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
          const payload={contents:[{parts:[{text:userMsg}]}],systemInstruction:{parts:[{text:"คุณคือ AI ผู้ช่วยสำหรับตัวแทนขายประกันภัยในระบบ IA CRM ให้คำแนะนำเกี่ยวกับการปิดการขาย สร้างสคริปต์การโทร ตอบข้อโต้แย้ง และวิเคราะห์ข้อมูลลูกค้า ตอบเป็นภาษาไทยด้วยความสุภาพ มืออาชีพ และกระชับเข้าใจง่าย ใช้ Markdown ในการจัดรูปแบบข้อความให้สวยงามได้"}]}};
          const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
          const data=await res.json();
          if(!res.ok) throw new Error(data.error?.message||'API Error');
          const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'ขออภัย ไม่สามารถประมวลผลได้ในขณะนี้';
          setMessages(prev=>[...prev,{role:'model',text:reply}]);
        } catch {
          setMessages(prev=>[...prev,{role:'model',text:'ขออภัย ระบบ AI ไม่สามารถตอบกลับได้ในขณะนี้'}]);
        } finally { setIsLoading(false); }
      };
      const formatMessage=(text)=>({__html:text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')});
      return (
        <div className="max-w-4xl mx-auto space-y-6 flex flex-col h-[calc(100vh-160px)] fade-up">
          <div className="bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 rounded-[2.5rem] p-6 lg:p-12 shadow-2xl text-white relative overflow-hidden flex flex-col flex-1 min-h-0 border border-indigo-500/20">
            <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-white/5 rounded-full blur-3xl -mt-40 -mr-40 pointer-events-none"></div>
            {messages.length===0?(
              <div className="flex-1 flex flex-col items-center justify-center text-center relative z-10">
                <Icon name="brain" size={64} className="mx-auto mb-6 text-indigo-300 animate-pulse drop-shadow-[0_0_15px_rgba(165,180,252,0.5)]"/>
                <h2 className="text-3xl lg:text-5xl font-black mb-4 tracking-tight">IA AI Assistant</h2>
                <p className="text-indigo-200 font-bold text-base max-w-xl mx-auto leading-relaxed">พิมพ์ปรึกษา AI ผู้ช่วยได้เลย!<br/>เช่น "ขอสคริปต์โทรหาลูกค้าเก่า", "วิธีตอบข้อโต้แย้งเรื่องเบี้ยแพง"</p>
              </div>
            ):(
              <div className="flex-1 overflow-y-auto mb-5 pr-2 space-y-5 custom-scrollbar relative z-10">
                {messages.map((msg,idx)=>(
                  <div key={idx} className={`flex flex-col ${msg.role==='user'?'items-end':'items-start'}`}>
                    <div className={`max-w-[85%] p-4 rounded-3xl ${msg.role==='user'?'bg-indigo-500 text-white rounded-br-sm shadow-md':'bg-white/10 text-indigo-50 rounded-bl-sm border border-white/10 backdrop-blur-md shadow-inner'}`}>
                      {msg.role==='model'&&<Icon name="sparkle" className="text-indigo-300 mb-2" size={18}/>}
                      <p className="whitespace-pre-wrap font-medium leading-relaxed text-sm" dangerouslySetInnerHTML={formatMessage(msg.text)}></p>
                    </div>
                  </div>
                ))}
                {isLoading&&(<div className="flex flex-col items-start"><div className="max-w-[85%] p-4 rounded-3xl bg-white/10 text-indigo-50 rounded-bl-sm border border-white/10 backdrop-blur-md flex items-center gap-3"><Icon name="circle-notch" className="animate-spin text-indigo-300" size={18}/><span className="font-bold text-indigo-200 text-sm">AI กำลังวิเคราะห์...</span></div></div>)}
                <div ref={messagesEndRef}/>
              </div>
            )}
            <form onSubmit={e=>{e.preventDefault();handleSend();}} className="mt-auto bg-white/10 p-3 rounded-3xl flex gap-3 backdrop-blur-xl border border-white/20 relative z-10 shadow-inner shrink-0">
              <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} disabled={isLoading} placeholder="พิมพ์ข้อความปรึกษา AI..." className="flex-1 bg-transparent border-none text-white outline-none placeholder-indigo-300/70 font-bold px-4 py-2 text-sm"/>
              <button type="submit" disabled={isLoading||!inputText.trim()} className="bg-indigo-500 px-6 py-2.5 rounded-2xl font-black hover:bg-indigo-400 shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-sm">ส่ง <Icon name="paper-plane-right"/></button>
            </form>
          </div>
        </div>
      );
    }

          else alert(`ส่งไม่สำเร็จ!\n\nสาเหตุ: ${data.description}`);

        runManualBackup(customers, user, showToast);

        showToast('เพิ่มแหล่งที่มาสำเร็จ!');

            <div className="flex flex-wrap gap-3">
              {leadSources.map(s=>(
                <span key={s} className={`flex items-center gap-2 px-4 py-2 rounded-2xl font-black text-sm border-2 ${DEFAULT_LEAD_SOURCES.includes(s)?'bg-slate-50 border-slate-200 text-slate-600':'bg-purple-50 border-purple-200 text-purple-700'}`}>
                  {s}
                  {!DEFAULT_LEAD_SOURCES.includes(s)&&<button onClick={()=>removeSrc(s)} className="text-purple-300 hover:text-red-500 transition font-black ml-1">✕</button>}
                </span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NovaCRMApp/>);
  </script>
</body>
</html>
