    const toBase64 = (file) => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);

      r.readAsDataURL(file);
    });

    function RadarChart({ values, labels, size = 200 }) {
      const n = labels.length;
      const cx = size / 2, cy = size / 2, r = size * 0.38;
      const angle = (i) => (Math.PI * 2 * i / n) - Math.PI / 2;
      const pt = (i, val) => {
        const a = angle(i);
        return { x: cx + r * val * Math.cos(a), y: cy + r * val * Math.sin(a) };
      };
      const rings = [0.25, 0.5, 0.75, 1.0];
      const axes = Array.from({length: n}, (_, i) => pt(i, 1));
      const dataPoints = values.map((v, i) => pt(i, v));
      const polyStr = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
      const ringPath = (frac) => {
        const pts = Array.from({length: n}, (_, i) => pt(i, frac));
        return pts.map((p,i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ') + 'Z';
      };
      return (
        <svg width={size} height={size} className="radar-svg">
          {rings.map((frac, ri) => (
            <path key={ri} d={ringPath(frac)} fill="none" stroke={ri===3?"#0ea5e9":"#cbd5e1"} strokeWidth={ri===3?2:1} strokeDasharray={ri===3?"":"4,3"}/>
          ))}
          {axes.map((p, i) => (
            <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1"/>
          ))}
          <polygon points={polyStr} fill="rgba(249,115,22,0.25)" stroke="#f97316" strokeWidth="2.5" strokeLinejoin="round"/>
          {dataPoints.map((p, i) => (
            <circle key={i} cx={p.x} cy={p.y} r="5" fill="#f97316" stroke="white" strokeWidth="2"/>
          ))}
          {axes.map((p, i) => {
            const lx = cx + (r + 18) * Math.cos(angle(i));
            const ly = cy + (r + 18) * Math.sin(angle(i));
            return <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize="9" fontWeight="bold" fill="#64748b">{labels[i]}</text>;
          })}
        </svg>
      );
    }

      const [currentUser, setCurrentUser] = useState(() => {
        const s = localStorage.getItem('crm_logged_in_user');
        return s ? JSON.parse(s) : null;
      });
      const [currentRoute, setCurrentRoute] = useState('home');
      const [isSidebarOpen, setSidebarOpen] = useState(false);
      // Pending approval state for admin
      const [pendingUsers, setPendingUsers] = useState([]);

      const showToast = (msg, type='success') => { setToastMsg(msg); setToastType(type); setTimeout(() => setToastMsg(null), 3500); };

      useEffect(() => {
        let isMounted = true;
        const initSystem = async () => {
          try {
            if (!window.MY_FIREBASE_CONFIG) { if(isMounted) setAppState('ready'); return; }
            if (!firebase.apps.length) firebase.initializeApp(window.MY_FIREBASE_CONFIG);
            const firestoreDb = firebase.firestore();
            setDb(firestoreDb);
            firebase.auth().onAuthStateChanged(user => {
              if(isMounted) {
                if(!user) firebase.auth().signInAnonymously().catch(() => setAppState('ready'));
                else setAppState('ready');
              }
            });
          } catch { if(isMounted) setAppState('ready'); }
        };
        const fallbackTimer = setTimeout(() => { if(isMounted) setAppState(prev => prev==='loading'?'ready':prev); }, 3500);
        initSystem();
        return () => { isMounted = false; clearTimeout(fallbackTimer); };
      }, []);

      useEffect(() => {
        if(!db) return;
        const unsubU = db.collection('crm_users').onSnapshot(snap => {
          const arr=[]; snap.forEach(d=>arr.push(d.data())); setUsers(arr);
          // Separate pending users
          const pending = arr.filter(u => u.status === 'pending');
          setPendingUsers(pending);
        });
        const unsubC = db.collection('crm_customers').onSnapshot(snap => { const arr=[]; snap.forEach(d=>arr.push(d.data())); setCustomers(arr); });
        const unsubT = db.collection('crm_tasks').onSnapshot(snap => { const arr=[]; snap.forEach(d=>arr.push(d.data())); setTasks(arr); });
        return () => { unsubU(); unsubC(); unsubT(); };
      }, [db]);

      useEffect(() => {
        if (currentUser && customers.length > 0) {
          const now = new Date();
          if (now.getDay() === 0) {
            setTimeout(() => runWeeklyBackup(customers, currentUser), 5000);
          }
        }
      }, [currentUser, customers]);

      const writeData = async (col, id, data) => {
        if(db) { try { await db.collection(col).doc(id).set(data); } catch(e) { showToast("พบปัญหาบันทึกข้อมูล",'error'); } }
      };
      const removeData = async (col, id) => { if(db) { try { await db.collection(col).doc(id).delete(); } catch {} } };

      // ===== APPROVE / REJECT user =====
      const approveUser = async (user) => {
        const approved = {...user, status: 'active'};
        await writeData('crm_users', user.id, approved);
        notifyTelegram(`✅ <b>อนุมัติผู้ใช้งานแล้ว:</b>\nชื่อ: ${user.name}\nทีม: ${user.team}\nโดย Admin`);
        showToast(`อนุมัติ ${user.name} เรียบร้อย!`);
      };

      const rejectUser = async (user) => {
        await removeData('crm_users', user.id);
        notifyTelegram(`❌ <b>ปฏิเสธผู้ใช้งาน:</b>\nชื่อ: ${user.name}\nโดย Admin`);
        showToast(`ปฏิเสธ ${user.name} แล้ว`, 'error');
      };

      const handleAuthSuccess = async (user) => {
        const existingUser = users.find(u=>u.id===user.id);
        const isAdmin = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
        if(!existingUser) {
          const newUser = {...user, status: isAdmin ? 'active' : 'pending'};
          await writeData('crm_users', newUser.id, newUser);
          if(!isAdmin) {
            notifyTelegram(`👤 <b>ผู้ใช้ใหม่ขอลงทะเบียน (รออนุมัติ):</b>\nชื่อ: ${user.name}\nทีม: ${user.team}\nอีเมล: ${user.email}`);
            showToast('ลงทะเบียนสำเร็จ! รอ Admin อนุมัติก่อนใช้งานได้', 'success');
            return; // Do not log in yet
          }
          localStorage.setItem('crm_logged_in_user', JSON.stringify(newUser));
          setCurrentUser(newUser); setCurrentRoute('home');
        } else {
          if(existingUser.status === 'pending') {
            showToast('บัญชีของคุณรออนุมัติจาก Admin อยู่', 'error');
            return;
          }
          notifyTelegram(`🔑 <b>เข้าสู่ระบบ:</b>\nชื่อ: ${existingUser.name}\nทีม: ${existingUser.team}`);
          localStorage.setItem('crm_logged_in_user', JSON.stringify(existingUser));
          setCurrentUser(existingUser); setCurrentRoute('home');
        }
      };

      const handleUpdateUser = async (updatedUser) => {
        await writeData('crm_users', updatedUser.id, updatedUser);
        if(currentUser && currentUser.id === updatedUser.id) {
          setCurrentUser(updatedUser);
          localStorage.setItem('crm_logged_in_user', JSON.stringify(updatedUser));
        }
        notifyTelegram(`⚙️ <b>อัปเดตข้อมูลผู้ใช้:</b>\nชื่อ: ${updatedUser.name}\nทีม: ${updatedUser.team}\nเป้ายอดขาย: ${formatCurrency(updatedUser.targetRevenue)}`);
      };

      const addCustomer = (data) => {
        writeData('crm_customers', data.id, { ...data, agent_id: currentUser.id });
        showToast('บันทึกข้อมูลลูกค้าสำเร็จ!');
        if(data.status==='ปิดการขาย') notifyTelegram(`🎉 <b>ปิดการขายสำเร็จ!</b>\n${currentUser.name} เพิ่มและปิดการขายลูกค้า: ${data.name}\nยอดเบี้ยรวม: ${formatCurrency(data.premium)}`, TELEGRAM_CHAT_ID);
        else notifyTelegram(`🆕 <b>เพิ่ม Lead ใหม่:</b>\nชื่อ: ${data.name}\nเบอร์โทร: ${data.phone}\nโดย: ${currentUser.name}`);
      };

      const updateCustomer = (data, newlyAddedPolicies=[]) => {
        const old = customers.find(c=>c.id===data.id);
        writeData('crm_customers', data.id, data); showToast('อัปเดตข้อมูลลูกค้าเรียบร้อย!');
        if(old && old.status!=='ปิดการขาย' && data.status==='ปิดการขาย')
          notifyTelegram(`🎉 <b>ปิดการขายสำเร็จ!</b>\n${currentUser.name} เพิ่งปิดการขายลูกค้า: ${data.name}\nยอดเบี้ยรวม: ${formatCurrency(data.premium)}\nแผน: ${data.interestedPlan||'-'}`, TELEGRAM_CHAT_ID);
        else if(newlyAddedPolicies.length>0)
          newlyAddedPolicies.forEach(p => notifyTelegram(`💰 <b>แจ้งเก็บเบี้ยรับใหม่!</b>\nตัวแทน: ${currentUser.name}\nลูกค้า: ${data.name}\nแผน: ${p.planName}\nเบี้ยที่เก็บได้: ${formatCurrency(p.premium)}`, TELEGRAM_CHAT_ID));
      };

      const deleteCustomer = (id) => {
        const c = customers.find(x=>x.id===id);
        removeData('crm_customers', id); showToast('ลบข้อมูลลูกค้าเรียบร้อย!');
        notifyTelegram(`🗑️ <b>ลบข้อมูลลูกค้า:</b>\nชื่อ: ${c?c.name:id}\nโดย: ${currentUser.name}`);
      };

      const addTask = (data) => {
        writeData('crm_tasks', data.id, { ...data, agent_id: currentUser.id }); showToast('เพิ่มงานสำเร็จ!');
        notifyTelegram(`📝 <b>เพิ่มงานใหม่:</b>\nหัวข้อ: ${data.title}\nวันที่: ${data.date}\nโดย: ${currentUser.name}`);
      };

      const toggleTask = (id) => {
        const t = tasks.find(x=>x.id===id);
        if(t) { writeData('crm_tasks', t.id, {...t, status: t.status==='completed'?'pending':'completed'}); notifyTelegram(`✅ <b>อัปเดตสถานะงาน:</b>\nหัวข้อ: ${t.title}\nเป็น: ${t.status==='completed'?'รอดำเนินการ':'เสร็จสิ้น'}\nโดย: ${currentUser.name}`); }
      };

      const removeTask = (id) => {
        const t = tasks.find(x=>x.id===id);
        removeData('crm_tasks', id);
        if(t) notifyTelegram(`❌ <b>ลบงาน:</b>\nหัวข้อ: ${t.title}\nโดย: ${currentUser.name}`);
      };

      if(appState==='loading') return <div className="h-screen w-screen flex flex-col items-center justify-center bg-slate-50"><Icon name="spinner-gap" size={48} className="animate-spin mb-4 text-blue-500"/><p className="font-bold text-slate-400">กำลังเชื่อมต่อฐานข้อมูล...</p></div>;
      if(!currentUser) return <AuthView onSuccess={handleAuthSuccess} users={users}/>;

      // Check if current user is still pending (in case they were already logged in)
      const liveUser = users.find(u=>u.id===currentUser.id);
      if(liveUser && liveUser.status === 'pending') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6">
            <div className="bg-white rounded-[2.5rem] p-10 max-w-md text-center shadow-xl fade-up">
              <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <Icon name="clock" size={40} className="text-yellow-500"/>
              </div>
              <h2 className="text-2xl font-black text-slate-800 mb-3">รอการอนุมัติ</h2>
              <p className="text-slate-500 font-bold leading-relaxed">บัญชีของคุณ <span className="text-blue-600">{currentUser.name}</span> อยู่ระหว่างรอ Admin อนุมัติ กรุณารอสักครู่</p>
              <button onClick={()=>{localStorage.removeItem('crm_logged_in_user');setCurrentUser(null);}} className="mt-8 px-8 py-3 bg-slate-100 rounded-2xl font-black text-slate-600 hover:bg-red-50 hover:text-red-600 transition">ออกจากระบบ</button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-slate-50 overflow-hidden text-slate-800">
          {toastMsg && (
            <div className={`fixed top-6 right-6 z-[200] ${toastType==='error'?'bg-red-500':'bg-emerald-500'} text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 fade-up`}>
              <IconFill name={toastType==='error'?'warning-circle':'check-circle'} size={24}/> <span className="font-black">{toastMsg}</span>
            </div>
          )}

          {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm" onClick={()=>setSidebarOpen(false)}/>}

          <aside className={`sidebar-bg fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 transform ${isSidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none`}>
            <div className="h-24 flex items-center px-8 border-b border-slate-100">
              <div className="flex items-center gap-3">
                <div className="dow-accent p-2.5 rounded-2xl shadow-lg">
                  <Icon name="activity" className="text-white" size={24}/>
                </div>
                <span className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">IA CRM</span>
              </div>
              <button className="lg:hidden ml-auto text-slate-400 bg-slate-100 p-2 rounded-xl" onClick={()=>setSidebarOpen(false)}><Icon name="x" size={20}/></button>
            </div>

            <nav className="flex-1 overflow-y-auto p-5 space-y-2 custom-scrollbar">
              <MenuLink icon="house" label="แดชบอร์ดหลัก" active={currentRoute==='home'} onClick={()=>{setCurrentRoute('home');setSidebarOpen(false);}} color="text-blue-600" bg="bg-blue-50 border-blue-100"/>
              {currentUser.role==='agent' && (<>
                <MenuLink icon="calendar-check" label="แผนงานวันนี้" active={currentRoute==='daily-plan'} onClick={()=>{setCurrentRoute('daily-plan');setSidebarOpen(false);}} color="text-teal-500" bg="bg-teal-50 border-teal-100"/>
                <MenuLink icon="user-plus" label="เพิ่ม Lead ใหม่" active={currentRoute==='add-lead'} onClick={()=>{setCurrentRoute('add-lead');setSidebarOpen(false);}} color="text-orange-500" bg="bg-orange-50 border-orange-100"/>
                <MenuLink icon="users" label="ฐานลูกค้าของฉัน" active={currentRoute==='customers'} onClick={()=>{setCurrentRoute('customers');setSidebarOpen(false);}} color="text-emerald-500" bg="bg-emerald-50 border-emerald-100"/>
                <MenuLink icon="funnel" label="Pipeline การขาย" active={currentRoute==='pipeline'} onClick={()=>{setCurrentRoute('pipeline');setSidebarOpen(false);}} color="text-purple-500" bg="bg-purple-50 border-purple-100"/>
                <MenuLink icon="trend-up" label="สถิติ KPI (Analytics)" active={currentRoute==='analytics'} onClick={()=>{setCurrentRoute('analytics');setSidebarOpen(false);}} color="text-pink-500" bg="bg-pink-50 border-pink-100"/>
                <MenuLink icon="brain" label="AI Assistant" active={currentRoute==='ai-assistant'} onClick={()=>{setCurrentRoute('ai-assistant');setSidebarOpen(false);}} color="text-indigo-500" bg="bg-indigo-50 border-indigo-100"/>
                <MenuLink icon="trophy" label="Team Ranking" active={currentRoute==='ranking'} onClick={()=>{setCurrentRoute('ranking');setSidebarOpen(false);}} color="text-yellow-500" bg="bg-yellow-50 border-yellow-100"/>
              </>)}
              {currentUser.role==='admin' && (<>
                <MenuLink icon="shield-check" label="ภาพรวมองค์กร" active={currentRoute==='home'} onClick={()=>{setCurrentRoute('home');setSidebarOpen(false);}} color="text-indigo-600" bg="bg-indigo-50 border-indigo-100"/>
                <MenuLink icon="database" label="ฐานข้อมูลลูกค้าทั้งหมด" active={currentRoute==='admin-customers'} onClick={()=>{setCurrentRoute('admin-customers');setSidebarOpen(false);}} color="text-emerald-600" bg="bg-emerald-50 border-emerald-100"/>
                {pendingUsers.length > 0 && (
                  <MenuLink icon="user-circle-gear" label={`อนุมัติผู้ใช้ (${pendingUsers.length})`} active={currentRoute==='approve-users'} onClick={()=>{setCurrentRoute('approve-users');setSidebarOpen(false);}} color="text-red-600" bg="bg-red-50 border-red-100"/>
                )}
              </>)}
              <div className="pt-4 mt-4 border-t border-slate-100">
                <MenuLink icon="gear" label="ตั้งค่าโปรไฟล์" active={currentRoute==='settings'} onClick={()=>{setCurrentRoute('settings');setSidebarOpen(false);}} color="text-slate-600" bg="bg-slate-100 border-slate-200"/>
              </div>
            </nav>

            <div className="p-6 bg-slate-50 border-t border-slate-200">
              <div className="flex items-center gap-4 mb-5">
                <div className="dow-accent w-12 h-12 rounded-full flex items-center justify-center font-black text-white text-xl shadow-md border-2 border-white">{currentUser.name.charAt(0)}</div>
                <div className="truncate flex-1">
                  <p className="text-sm font-black text-slate-800 truncate">{currentUser.name}</p>
                  <p className="text-[10px] font-bold text-slate-500 bg-slate-200 inline-block px-2 py-0.5 rounded-md mt-1 uppercase tracking-widest">{currentUser.role==='admin'?'ADMINISTRATOR':currentUser.team}</p>
                </div>
              </div>
              <button onClick={()=>{localStorage.removeItem('crm_logged_in_user');setCurrentUser(null);}} className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl bg-white border-2 border-slate-200 text-slate-600 hover:bg-red-50 hover:text-red-600 transition-all font-black text-sm">
                <Icon name="sign-out" size={18}/> ออกจากระบบ
              </button>
            </div>
          </aside>

          <main className="flex-1 overflow-auto relative bg-slate-50/50">
            <header className="h-16 lg:h-24 bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-30 px-4 lg:px-10 flex items-center justify-between shadow-sm">
              <div className="flex items-center gap-3">
                <button className="lg:hidden p-2.5 bg-white border-2 border-slate-200 rounded-xl text-slate-600" onClick={()=>setSidebarOpen(true)}><Icon name="list" size={22}/></button>
                <h1 className="text-lg lg:text-2xl font-black text-slate-800 uppercase tracking-tight capitalize hidden sm:block">{currentRoute.replace('-',' ')}</h1>
              </div>
              <div className="flex items-center gap-2 lg:gap-4">
                <TimeDisplay/>
                {/* Manual Backup Button */}
                {currentUser.role==='agent' && (
                  <button onClick={()=>runManualBackup(customers, currentUser, showToast)} className="hidden sm:flex items-center gap-2 px-3 py-2 rounded-xl border bg-indigo-50 border-indigo-100 hover:bg-indigo-100 transition" title="Backup ข้อมูล">
                    <Icon name="cloud-arrow-up" size={18} className="text-indigo-600"/>
                    <span className="text-[10px] font-black uppercase tracking-widest text-indigo-700 hidden lg:inline">Backup</span>
                  </button>
                )}
                <div className="flex items-center gap-1.5 px-3 py-2 rounded-xl border bg-emerald-50 border-emerald-100">
                  <div className="w-2 h-2 rounded-full animate-pulse bg-emerald-500 relative pulse-ring" style={{color:'#10b981'}}></div>
                  <span className="text-[10px] font-black uppercase tracking-widest text-emerald-700 hidden sm:inline">Cloud Sync</span>
                </div>
              </div>
            </header>

            <div className="p-3 lg:p-10 max-w-[1600px] mx-auto space-y-6 lg:space-y-10 pb-24 main-content-mobile fade-up">
              {currentUser.role==='admin' ? (<>
                {currentRoute==='home' && <AdminHomeView users={users} customers={customers} showToast={showToast} pendingUsers={pendingUsers} approveUser={approveUser} rejectUser={rejectUser}/>}
                {currentRoute==='admin-customers' && <AdminCustomersView customers={customers} users={users} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer}/>}
                {currentRoute==='approve-users' && <ApproveUsersView pendingUsers={pendingUsers} approveUser={approveUser} rejectUser={rejectUser}/>}
                {currentRoute==='settings' && <SettingsView user={currentUser} handleUpdateUser={handleUpdateUser} showToast={showToast} customers={customers}/>}
              </>) : (<>
                {currentRoute==='home' && <AgentHomeView user={currentUser} customers={customers} tasks={tasks} addTask={addTask} toggleTask={toggleTask} removeTask={removeTask} handleUpdateUser={handleUpdateUser} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer}/>}
                {currentRoute==='daily-plan' && <DailyPlanView user={currentUser} customers={customers} tasks={tasks} addTask={addTask} toggleTask={toggleTask} removeTask={removeTask}/>}
                {currentRoute==='add-lead' && <AddLeadView onAdd={addCustomer} setRoute={setCurrentRoute}/>}
                {currentRoute==='customers' && <CustomersView user={currentUser} customers={customers} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer}/>}
                {currentRoute==='pipeline' && <PipelineView customers={customers.filter(c=>c.agent_id===currentUser.id)}/>}
                {currentRoute==='analytics' && <AnalyticsView customers={customers.filter(c=>c.agent_id===currentUser.id)}/>}
                {currentRoute==='ranking' && <RankingView users={users} customers={customers} currentUser={currentUser}/>}
                {currentRoute==='ai-assistant' && <AIAssistantView/>}
                {currentRoute==='settings' && <SettingsView user={currentUser} handleUpdateUser={handleUpdateUser} showToast={showToast} customers={customers}/>}
                {currentRoute==='more' && (
                  <div className="space-y-4 fade-up">
                    <h2 className="text-2xl font-black text-slate-800">เมนูเพิ่มเติม</h2>
                    <div className="grid grid-cols-2 gap-4">
                      {[
                        {icon:'user-plus',label:'เพิ่ม Lead',route:'add-lead',color:'bg-orange-500'},
                        {icon:'funnel',label:'Pipeline',route:'pipeline',color:'bg-purple-500'},
                        {icon:'brain',label:'AI ช่วยขาย',route:'ai-assistant',color:'bg-indigo-500'},
                        {icon:'trophy',label:'Ranking',route:'ranking',color:'bg-yellow-500'},
                        {icon:'gear',label:'ตั้งค่า',route:'settings',color:'bg-slate-500'},
                      ].map(item => (
                        <button key={item.route} onClick={()=>setCurrentRoute(item.route)} className={`${item.color} text-white p-6 rounded-3xl font-black flex flex-col items-center gap-3 shadow-lg hover:opacity-90 transition`}>
                          <Icon name={item.icon} size={32}/>{item.label}
                        </button>
                      ))}
                      <button onClick={()=>runManualBackup(customers, currentUser, showToast)} className="bg-blue-600 text-white p-6 rounded-3xl font-black flex flex-col items-center gap-3 shadow-lg hover:opacity-90 transition">
                        <Icon name="cloud-arrow-up" size={32}/> Backup
                      </button>
                    </div>
                  </div>
                )}
              </>)}
            </div>
          </main>

          <nav className="mobile-bottom-nav">
            {(currentUser.role === 'agent' ? [
              { icon: 'house',          label: 'หน้าหลัก',  route: 'home' },
              { icon: 'calendar-check', label: 'แผนวันนี้', route: 'daily-plan' },
              { icon: 'users',          label: 'ลูกค้า',    route: 'customers' },
              { icon: 'trend-up',       label: 'KPI',        route: 'analytics' },
              { icon: 'dots-three',     label: 'เพิ่มเติม', route: 'more' },
            ] : [
              { icon: 'house',    label: 'ภาพรวม',  route: 'home' },
              { icon: 'database', label: 'ลูกค้า',   route: 'admin-customers' },
              { icon: 'gear',     label: 'ตั้งค่า',  route: 'settings' },
            ]).map(item => {
              const active = currentRoute === item.route;
              return (
                <button key={item.route} onClick={()=>{setCurrentRoute(item.route);setSidebarOpen(false);}} className={`flex flex-col items-center gap-1 px-3 py-2 rounded-2xl transition-all ${active?'dow-accent text-white shadow-lg scale-110':' text-slate-400'}`}>
                  <Icon name={item.icon} size={active?22:20}/>
                  <span className={`text-[10px] font-black`}>{item.label}</span>
                </button>
              );
            })}
          </nav>
        </div>
      );
    }

    // ===== TIME DISPLAY =====
    function TimeDisplay() {
      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(t); },[]);
      const h = now.getHours();
      const greeting = h<10?'อรุณสวัสดิ์ 🌅':h<17?'สวัสดีตอนบ่าย ☀️':h<21?'สวัสดีตอนเย็น 🌆':'ราตรีสวัสดิ์ 🌙';
      const days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
      const dayColors = ['text-red-500','text-yellow-600','text-pink-500','text-green-600','text-orange-500','text-blue-600','text-purple-600'];
      return (
        <div className="hidden md:flex flex-col items-end">
          <span className={`text-xs font-black uppercase tracking-widest ${dayColors[now.getDay()]}`}>{greeting} | วัน{days[now.getDay()]} {toBuddhistYear(getTodayStr())}</span>
          <span className="text-lg font-black text-slate-700 tabular-nums">{now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>

    function MenuLink({ icon, label, active, onClick, color, bg, href }) {
      const cls = `w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-black group ${active?`${bg} ${color} border-2 shadow-sm transform scale-[1.02]`:'text-slate-500 hover:bg-slate-50 hover:text-slate-800 border-2 border-transparent'}`;
      if(href) return <a href={href} target="_blank" rel="noopener noreferrer" className={cls}><Icon name={icon} size={22} className={`${active?color:'text-slate-400 group-hover:'+color} transition-colors`}/>{label}</a>;
      return <button onClick={onClick} className={cls}><Icon name={icon} size={22} className={`${active?color:'text-slate-400 group-hover:'+color} transition-colors`}/>{label}</button>;
    }

    // ============================================================================
    // AUTH VIEW
    // ============================================================================
    function AuthView({ onSuccess, users }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
      const [name, setName] = useState(''); const [team, setTeam] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [successMsg, setSuccessMsg] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault(); setErrorMsg(''); setSuccessMsg('');
        if(isLogin) {
          const user = users.find(u=>(u.email||'').toLowerCase()===email.toLowerCase()&&u.password===password);
          if(user) onSuccess(user); else setErrorMsg("รหัสผ่านหรืออีเมลไม่ถูกต้อง");
        } else {
          if(users.find(u=>(u.email||'').toLowerCase()===email.toLowerCase())) return setErrorMsg("อีเมลนี้มีการลงทะเบียนแล้ว");
          const role = email.toLowerCase()===ADMIN_EMAIL.toLowerCase()?'admin':'agent';
          onSuccess({ id:Date.now().toString(), name, email, password, team:role==='admin'?'HQ Management':team, role, targetRevenue:100000, telegramChatId:'' });
          if(role !== 'admin') setSuccessMsg('ส่งคำขอลงทะเบียนแล้ว! รอ Admin อนุมัติ');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-900 bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center">
          <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md"></div>
          <div className="bg-white rounded-[3rem] shadow-2xl p-8 sm:p-12 w-full max-w-lg relative z-10 fade-up">
            <div className="text-center mb-8">
              <div className="dow-accent w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-xl transform rotate-3"><Icon name="activity" className="text-white" size={40}/></div>
              <h2 className="text-4xl font-black text-slate-800 tracking-tight">IA CRM</h2>
              <p className="text-slate-500 font-bold mt-2 uppercase tracking-widest text-xs">Platform สำหรับนักขายมืออาชีพ</p>
            </div>
            {errorMsg && <div className="mb-6 p-4 bg-red-50 border-2 border-red-200 rounded-2xl flex items-center gap-3 text-red-600 font-bold text-sm"><Icon name="warning-circle" size={20}/>{errorMsg}</div>}
            {successMsg && <div className="mb-6 p-4 bg-emerald-50 border-2 border-emerald-200 rounded-2xl flex items-center gap-3 text-emerald-700 font-bold text-sm"><Icon name="check-circle" size={20}/>{successMsg}</div>}
            <div className="flex bg-slate-100 p-2 rounded-2xl mb-8 border border-slate-200">
              <button type="button" onClick={()=>{setIsLogin(true);setErrorMsg('');setSuccessMsg('');}} className={`flex-1 py-3 font-black text-sm rounded-xl transition-all ${isLogin?'bg-white text-blue-600 shadow-md':'text-slate-500'}`}>เข้าสู่ระบบ</button>
              <button type="button" onClick={()=>{setIsLogin(false);setErrorMsg('');setSuccessMsg('');}} className={`flex-1 py-3 font-black text-sm rounded-xl transition-all ${!isLogin?'bg-white text-blue-600 shadow-md':'text-slate-500'}`}>ลงทะเบียนใหม่</button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="space-y-2"><label className="text-xs font-black text-slate-700 ml-1 uppercase">อีเมล</label><div className="relative"><Icon name="envelope" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" size={20}/><input required type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full pl-12 pr-5 py-4 rounded-2xl border-2 border-slate-200 font-bold outline-none focus:border-blue-500" placeholder="name@example.com"/></div></div>
              {!isLogin && (<>
                <div className="space-y-2"><label className="text-xs font-black text-slate-700 ml-1 uppercase">ชื่อ - นามสกุล</label><div className="relative"><Icon name="user" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" size={20}/><input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full pl-12 pr-5 py-4 rounded-2xl border-2 border-slate-200 font-bold outline-none focus:border-blue-500" placeholder="ระบุชื่อจริง นามสกุล"/></div></div>
                <div className="space-y-2"><label className="text-xs font-black text-slate-700 ml-1 uppercase">ชื่อทีม</label><div className="relative"><Icon name="users" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" size={20}/><input required type="text" value={team} onChange={e=>setTeam(e.target.value)} className="w-full pl-12 pr-5 py-4 rounded-2xl border-2 border-slate-200 font-bold outline-none focus:border-blue-500" placeholder="เช่น ทีมมังกรทอง"/></div></div>
              </>)}
              <div className="space-y-2"><label className="text-xs font-black text-slate-700 ml-1 uppercase">รหัสผ่าน</label><div className="relative"><Icon name="lock" className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" size={20}/><input required type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full pl-12 pr-5 py-4 rounded-2xl border-2 border-slate-200 font-bold outline-none focus:border-blue-500" placeholder="••••••••"/></div></div>
              {!isLogin && (
                <div className="p-4 bg-yellow-50 border-2 border-yellow-200 rounded-2xl text-yellow-800 font-bold text-sm flex items-start gap-3">
                  <Icon name="info" size={20} className="flex-shrink-0 mt-0.5"/>
                  <span>หลังลงทะเบียน บัญชีจะต้องได้รับการอนุมัติจาก Admin ก่อนจึงเข้าใช้งานได้</span>
                </div>
              )}
              <button type="submit" className="w-full py-4 dow-accent hover:opacity-90 text-white font-black rounded-2xl shadow-xl transform hover:-translate-y-1 text-lg mt-8 transition-all">{isLogin?'เข้าสู่ระบบ':'ส่งคำขอลงทะเบียน'}</button>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================================
    // APPROVE USERS VIEW (Admin)
    // ============================================================================
    function ApproveUsersView({ pendingUsers, approveUser, rejectUser }) {
      return (
        <div className="max-w-3xl mx-auto space-y-6 fade-up">
          <div>
            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><Icon name="user-circle-gear" className="text-red-500" size={36}/> รออนุมัติผู้ใช้งาน</h2>
            <p className="text-slate-500 font-bold mt-1 text-xs uppercase tracking-widest">ผู้ลงทะเบียนใหม่ที่รอการอนุมัติจาก Admin</p>

                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================================
    // DAILY PLAN VIEW (ตัดกิจกรรมประจำวัน Grid ออก, เก็บฟีเจอร์ทั้งหมด)
    // ============================================================================
    function DailyPlanView({ user, customers, tasks, addTask, toggleTask, removeTask }) {
      const today = getTodayStr();
      const dow = new Date().getDay();
      const dc = DAY_COLORS[dow];
      const myTasks = tasks.filter(t => t.agent_id === user.id);
      const todayTasks = myTasks.filter(t => t.date === today);

      const planKey = `daily_plan_${user.id}_${today}`;
      const loadPlan = () => { try { return JSON.parse(localStorage.getItem(planKey) || '{}'); } catch { return {}; } };
      const [plan, setPlan] = useState(loadPlan);

      const savePlan = (newPlan) => { setPlan(newPlan); localStorage.setItem(planKey, JSON.stringify(newPlan)); };
      const setPlanField = (key, val) => savePlan({ ...plan, [key]: val });
      const toggleMindset = (m) => {
        const cur = plan.mindset || {};
        savePlan({ ...plan, mindset: { ...cur, [m]: !cur[m] } });
      };

      const updateTargetRow = (i, field, val) => {
        const rows = [...(plan.targetRows || Array(5).fill({name:'',target:'',check:'',result:''}))];
        rows[i] = { ...rows[i], [field]: val };
        savePlan({ ...plan, targetRows: rows });
      };
      const targetRows = plan.targetRows || Array(5).fill(null).map(() => ({name:'',target:'',check:'',result:''}));

      const updateSitRow = (i, field, val) => {
        const rows = [...(plan.sitRows || Array(4).fill({name:'',situation:'',how:'',who:''}))];
        rows[i] = { ...rows[i], [field]: val };
        savePlan({ ...plan, sitRows: rows });
      };
      const sitRows = plan.sitRows || Array(4).fill(null).map(() => ({name:'',situation:'',how:'',who:''}));

      const mindsetChecked = MINDSET_LIST.map(m => (plan.mindset||{})[m] ? 1 : 0);
      const radarScore = MINDSET_LIST.map(m => (plan.mindset||{})[m] ? 1 : 0.15);

      const weekStats = useMemo(() => {
        const arr = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const ds = d.toISOString().split('T')[0];
          const k = `daily_plan_${user.id}_${ds}`;
          try {
            const p = JSON.parse(localStorage.getItem(k) || '{}');
            const score = MINDSET_LIST.filter(m => (p.mindset||{})[m]).length;
            arr.push({ date: ds, score, label: ['อา','จ','อ','พ','พฤ','ศ','ส'][d.getDay()] });
          } catch { arr.push({ date: ds, score: 0, label: ['อา','จ','อ','พ','พฤ','ศ','ส'][d.getDay()] }); }
        }
        return arr;
      }, [user.id]);

      // Monthly review from image
      const monthKey = `monthly_review_${user.id}_${new Date().getFullYear()}_${new Date().getMonth()}`;
      const loadMonthly = () => { try { return JSON.parse(localStorage.getItem(monthKey) || '{}'); } catch { return {}; } };
      const [monthly, setMonthly] = useState(loadMonthly);
      const saveMonthly = (data) => { setMonthly(data); localStorage.setItem(monthKey, JSON.stringify(data)); };
      const monthNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
      const currentMonthName = monthNames[new Date().getMonth()];

      const [newTaskStr, setNewTaskStr] = useState('');
      const [newTaskTime, setNewTaskTime] = useState('09:00');
      const addTodayTask = () => {
        if (!newTaskStr.trim()) return;
        addTask({ id: Date.now().toString(), title: newTaskStr, date: today, time: newTaskTime, priority: 'normal', status: 'pending' });
        setNewTaskStr('');
      };

      return (
        <div className="space-y-6 fade-up max-w-4xl mx-auto">
          {/* HEADER */}
          <div className={`${dc.bg} border-2 ${dc.border} rounded-3xl p-6`}>
            <div className="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between">
              <div>
                <h2 className={`text-3xl font-black ${dc.text} flex items-center gap-3`}><Icon name="calendar-check" size={32}/> แผนงานวันนี้</h2>
                <p className="font-bold text-slate-500 mt-1">{toBuddhistYear(today)} | วัน{dc.label}</p>
              </div>
              <div className={`${dc.border} border-2 rounded-2xl px-6 py-3 text-center`}>
                <p className="text-xs font-black text-slate-400">Mindset Score</p>
                <p className={`text-4xl font-black ${dc.text}`}>{mindsetChecked.filter(Boolean).length}<span className="text-lg">/{MINDSET_LIST.length}</span></p>
              </div>
            </div>
          </div>

          {/* TODAY'S GOAL */}
          <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm">
            <h3 className="font-black text-slate-700 mb-4 flex items-center gap-2 text-lg"><Icon name="target" size={24} className="text-orange-500"/> Today's Goal</h3>
            <textarea value={plan.goal || ''} onChange={e => setPlanField('goal', e.target.value)} rows={3}
              placeholder="เป้าหมายที่ต้องทำให้ได้วันนี้..."
              className="w-full px-4 py-3 border-2 border-orange-200 bg-orange-50 rounded-2xl outline-none font-bold text-slate-800 placeholder-orange-300 focus:border-orange-400 resize-none"/>
          </div>

          {/* MINDSET CHECKLIST + RADAR */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm">
              <h3 className="font-black text-slate-700 mb-4 flex items-center gap-2 text-lg"><Icon name="brain" size={24} className="text-purple-500"/> Mindset Checklist</h3>
              <div className="space-y-3">
                {MINDSET_LIST.map((m, i) => (
                  <label key={i} className="mindset-check group">
                    <input type="checkbox" checked={!!(plan.mindset||{})[m]} onChange={() => toggleMindset(m)}/>
                    <span className={`font-black text-sm ${(plan.mindset||{})[m] ? 'text-emerald-600 line-through' : 'text-slate-700'} group-hover:text-blue-600 transition-colors`}>{m}</span>
                  </label>
                ))}
              </div>
            </div>
            <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm flex flex-col items-center">
              <h3 className="font-black text-slate-700 mb-4 flex items-center gap-2 text-lg"><Icon name="chart-polar" size={24} className="text-teal-500"/> Mindset Radar</h3>
              <RadarChart values={radarScore} labels={MINDSET_LIST.map(m=>m.slice(0,4))} size={220}/>
            </div>
          </div>

          {/* TARGET TABLE */}
          <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm">
            <h3 className="font-black text-slate-700 mb-4 flex items-center gap-2 text-lg"><Icon name="flag" size={24} className="text-red-500"/> เป้าหมายรายบุคคล</h3>
            <div className="overflow-x-auto">
              <table className="w-full border-collapse">
                <thead><tr>{['NAME','TARGET','CHECK','RESULT'].map(h => (<th key={h} className="border-2 border-slate-200 px-4 py-3 text-sm font-black text-slate-600 bg-slate-50">{h}</th>))}</tr></thead>
                <tbody>
                  {targetRows.map((row, i) => (
                    <tr key={i}>{['name','target','check','result'].map(f => (<td key={f} className="border-2 border-slate-200 p-1"><input type="text" value={row[f]||''} onChange={e=>updateTargetRow(i,f,e.target.value)} className="w-full px-3 py-2 text-sm font-bold outline-none bg-transparent min-w-[80px]"/></td>))}</tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* SITUATION TABLE */}
          <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm">
            <h3 className="font-black text-slate-700 mb-4 flex items-center gap-2 text-lg"><Icon name="lightning" size={24} className="text-yellow-500"/> สถานการณ์ & แผนรับมือ</h3>
            <div className="overflow-x-auto">
              <table className="w-full border-collapse">
                <thead><tr>{['NAME','Situation','HOW','WHO'].map(h => (<th key={h} className={`border-2 border-slate-200 px-4 py-3 text-sm font-black text-slate-600 bg-slate-50 ${h==='Situation'?'w-1/2':''}`}>{h}</th>))}</tr></thead>
                <tbody>
                  {sitRows.map((row, i) => (
                    <tr key={i}>
                      <td className="border-2 border-slate-200 p-1"><input type="text" value={row.name||''} onChange={e=>updateSitRow(i,'name',e.target.value)} className="w-full px-3 py-2 text-sm font-bold outline-none bg-transparent min-w-[70px]"/></td>
                      <td className="border-2 border-slate-200 p-1"><input type="text" value={row.situation||''} onChange={e=>updateSitRow(i,'situation',e.target.value)} className="w-full px-3 py-2 text-sm font-bold outline-none bg-transparent min-w-[140px]"/></td>
                      <td className="border-2 border-slate-200 p-1"><input type="text" value={row.how||''} onChange={e=>updateSitRow(i,'how',e.target.value)} className="w-full px-3 py-2 text-sm font-bold outline-none bg-transparent min-w-[100px]"/></td>
                      <td className="border-2 border-slate-200 p-1"><input type="text" value={row.who||''} onChange={e=>updateSitRow(i,'who',e.target.value)} className="w-full px-3 py-2 text-sm font-bold outline-none bg-transparent min-w-[70px]"/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* ===== MONTHLY REVIEW (from image) ===== */}
          <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
              <h3 className="font-black text-slate-700 flex items-center gap-2 text-lg"><Icon name="pencil-simple-line" size={24} className="text-indigo-500"/> สรุปแผนและเป้าหมาย</h3>
              <div className="flex items-center gap-3">
                <span className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-xl font-black text-xs">เดือน {currentMonthName} {new Date().getFullYear()+543}</span>
                <button onClick={()=>saveMonthly(monthly)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-black text-xs flex items-center gap-2 hover:bg-indigo-700 transition shadow-md">
                  <Icon name="floppy-disk" size={14}/> บันทึกข้อมูล
                </button>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-green-50 rounded-2xl p-4 border border-green-200">
                <p className="font-black text-green-700 text-sm mb-2">ทำอะไรสำเร็จตามเป้าหมายแล้วบ้าง?</p>
                <textarea value={monthly.success||''} onChange={e=>setMonthly({...monthly,success:e.target.value})} rows={4} placeholder="พิมพ์บันทึกความสำเร็จ..." className="w-full bg-transparent outline-none font-bold text-sm text-green-800 placeholder-green-400 resize-none"/>
              </div>
              <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200">
                <p className="font-black text-slate-700 text-sm mb-2">สรุปเดือนนี้</p>
                <textarea value={monthly.summary||''} onChange={e=>setMonthly({...monthly,summary:e.target.value})} rows={4} placeholder="พิมพ์ข้อความสรุป..." className="w-full bg-transparent outline-none font-bold text-sm text-slate-700 placeholder-slate-400 resize-none"/>
              </div>
              <div className="bg-blue-50 rounded-2xl p-4 border border-blue-200">
                <p className="font-black text-blue-700 text-sm mb-2">สิ่งที่ทำได้ดี</p>
                <textarea value={monthly.good||''} onChange={e=>setMonthly({...monthly,good:e.target.value})} rows={4} placeholder="พิมพ์สิ่งที่ทำได้ดี..." className="w-full bg-transparent outline-none font-bold text-sm text-blue-800 placeholder-blue-400 resize-none"/>
              </div>
              <div className="bg-pink-50 rounded-2xl p-4 border border-pink-200">
                <p className="font-black text-pink-700 text-sm mb-2">สิ่งที่ควรปรับปรุง</p>
                <textarea value={monthly.improve||''} onChange={e=>setMonthly({...monthly,improve:e.target.value})} rows={4} placeholder="พิมพ์สิ่งที่ต้องแก้ไข..." className="w-full bg-transparent outline-none font-bold text-sm text-pink-800 placeholder-pink-400 resize-none"/>
              </div>
            </div>
          </div>

          {/* TASKS TODAY */}
          <div className="bg-white rounded-3xl border-2 border-slate-100 p-6 shadow-sm">
            <h3 className="font-black text-slate-700 mb-4 flex items-center gap-2 text-lg"><Icon name="check-square" size={24} className="text-emerald-500"/> งานวันนี้</h3>

                  <div className="flex items-center gap-2">

                    <span className="font-black text-slate-700 text-sm px-2">{calendarMonth.toLocaleDateString('th-TH',{month:'long',year:'numeric'})}</span>
                    <button onClick={()=>setCalendarMonth(new Date(calYear,calMonth+1,1))} className="p-2 rounded-xl bg-slate-100 hover:bg-slate-200 transition"><Icon name="caret-right" size={18}/></button>
                  </div>
                </div>
                {/* Legend */}
                <div className="flex flex-wrap gap-2 text-[10px] font-black">
                  <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded-lg flex items-center gap-1"><span>📅</span>นัดหมาย</span>
                  <span className="bg-orange-100 text-orange-700 px-2 py-1 rounded-lg flex items-center gap-1"><span>🔄</span>ต่ออายุ</span>
                  <span className="bg-pink-100 text-pink-700 px-2 py-1 rounded-lg flex items-center gap-1"><span>🎂</span>วันเกิด</span>
                  <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg flex items-center gap-1"><span>✅</span>งาน</span>
                </div>
              </div>

              <div className="flex-1 overflow-auto custom-scrollbar p-2">
                <div className="grid grid-cols-7 gap-0.5 mb-0.5">
                  {dayNames.map((d,i) => (<div key={i} className={`text-center text-xs font-black py-2 rounded-lg ${dayTextColors[i]}`}>{d}</div>))}
                </div>
                <div className="grid grid-cols-7 gap-0.5">
                  {Array(firstDay).fill(null).map((_,i) => <div key={`e${i}`} className="min-h-[70px] lg:min-h-[85px]"/>)}
                  {Array(daysInCal).fill(null).map((_,i) => {
                    const day = i + 1;
                    const col = (firstDay + i) % 7;
                    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    const dayEvents = calendarEvents[dateStr] || [];
                    const isToday = dateStr === getTodayStr();
                    const isSelected = selectedCalDay === dateStr;
                    const cc = colColors[col];
                    const ccBg = colBgColors[col];
                    const hasHighTask = dayEvents.some(e=>e.type==='task'&&e.priority==='high'&&e.status!=='completed');
                    const hasPending = dayEvents.some(e=>e.status!=='completed'||e.type!=='task');

                    return (
                      <div key={day} onClick={() => setSelectedCalDay(isSelected ? null : dateStr)}
                        className={`min-h-[70px] lg:min-h-[85px] rounded-xl border-2 p-1 cursor-pointer transition-all relative ${isToday ? 'dow-accent border-transparent shadow-lg' : isSelected ? `${ccBg} ${cc} shadow-md` : `${ccBg} ${cc} hover:shadow-md`}`}>
                        <div className={`text-xs font-black w-6 h-6 rounded-lg flex items-center justify-center mb-1 ${isToday ? 'bg-white/30 text-white' : dayTextColors[col]}`}>{day}</div>
                        {dayEvents.slice(0,3).map((ev,ei) => {
                          let cls = '';
                          if(ev.type==='task') cls = ev.status==='completed'?'bg-emerald-100 text-emerald-700 line-through':ev.priority==='high'?'bg-red-100 text-red-700':isToday?'bg-white/20 text-white':'bg-white/80 text-slate-700';
                          else cls = isToday?'bg-white/20 text-white':(ev.color||'bg-slate-100 text-slate-700');
                          return <div key={ei} className={`text-[9px] font-black px-1 py-0.5 rounded mb-0.5 truncate leading-tight ${cls}`}>{ev.label}</div>;
                        })}
                        {dayEvents.length > 3 && <div className={`text-[9px] text-center font-black ${isToday?'text-white/70':'text-slate-400'}`}>+{dayEvents.length-3}</div>}
                        {hasPending && !isToday && <div className={`w-1.5 h-1.5 rounded-full absolute bottom-1 right-1 ${hasHighTask?'bg-red-500':'bg-blue-500'}`}/>}
                      </div>
                    );
                  })}
                </div>

                {/* Selected day detail */}
                {selectedCalDay && (calendarEvents[selectedCalDay]||[]).length > 0 && (
                  <div className="mt-3 bg-slate-50 rounded-2xl p-4 border-2 border-slate-200 fade-up">
                    <p className="font-black text-slate-700 mb-3 flex items-center gap-2 text-sm"><Icon name="calendar" size={16} className="text-blue-500"/> {toBuddhistYear(selectedCalDay)} — {(calendarEvents[selectedCalDay]||[]).length} กิจกรรม</p>
                    <div className="space-y-2">
                      {(calendarEvents[selectedCalDay]||[]).map((ev,i) => {
                        if(ev.type==='task') {
                          const cfg = priorityConfig[ev.raw?.priority||'normal'];
                          return (
                            <div key={i} className={`flex items-center gap-3 p-3 rounded-xl border-2 ${ev.status==='completed'?'border-slate-200 bg-white opacity-60':cfg.border+' bg-white'}`}>
                              <button onClick={e=>{e.stopPropagation();toggleTask(ev.id);}} className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${ev.status==='completed'?'bg-emerald-500 border-emerald-500 text-white':'border-slate-300'}`}>
                                {ev.status==='completed'&&<Icon name="check" size={12}/>}
                              </button>
                              <span className={`font-black text-sm flex-1 ${ev.status==='completed'?'line-through text-slate-400':'text-slate-800'}`}>{ev.label}</span>
                              <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${cfg.badge}`}>{cfg.label}</span>
                            </div>
                          );
                        }
                        return (
                          <div key={i} className={`flex items-center gap-3 p-3 rounded-xl border-2 border-slate-100 bg-white ${ev.customer?'cursor-pointer hover:border-blue-200':''}`} onClick={()=>ev.customer&&setSelectedAlertCustomer(ev.customer)}>
                            <span className="text-lg">{ev.type==='appointment'?'📅':ev.type==='renewal'?'🔄':'🎂'}</span>
                            <span className="font-black text-sm flex-1 text-slate-800">{ev.label}</span>
                            {ev.customer && <Icon name="caret-right" size={14} className="text-slate-400"/>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Quick add task */}
                <div className="mt-3 bg-white rounded-2xl border-2 border-slate-200 p-3">
                  <p className="text-xs font-black text-slate-400 mb-2 uppercase">เพิ่มงานใหม่</p>
                  <div className="flex flex-wrap gap-2">
                    <input type="date" value={newTaskDate} onChange={e=>setNewTaskDate(e.target.value)} className="px-3 py-2 rounded-xl bg-slate-50 border-2 border-slate-200 outline-none font-bold text-xs focus:border-blue-500"/>
                    <input type="time" value={newTaskTime} onChange={e=>setNewTaskTime(e.target.value)} className="px-3 py-2 rounded-xl bg-slate-50 border-2 border-slate-200 outline-none font-bold text-xs focus:border-blue-500"/>
                    <select value={newTaskPriority} onChange={e=>setNewTaskPriority(e.target.value)} className="px-3 py-2 rounded-xl bg-slate-50 border-2 border-slate-200 outline-none font-bold text-xs">
                      <option value="high">🔴 เร่งด่วน</option>
                      <option value="normal">🟡 ปกติ</option>
                      <option value="low">🟢 ไม่เร่งด่วน</option>
                    </select>
                  </div>
                  <div className="flex gap-2 mt-2">
                    <input type="text" placeholder="รายละเอียดงาน..." value={newTaskStr} onChange={e=>setNewTaskStr(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter'&&newTaskStr){addTask({id:Date.now().toString(),title:newTaskStr,date:newTaskDate,time:newTaskTime,priority:newTaskPriority,status:'pending'});setNewTaskStr('');}}}
                      className="flex-1 px-3 py-2 rounded-xl bg-slate-50 border-2 border-slate-200 outline-none font-bold text-sm focus:border-blue-500"/>
                    <button onClick={()=>{if(newTaskStr){addTask({id:Date.now().toString(),title:newTaskStr,date:newTaskDate,time:newTaskTime,priority:newTaskPriority,status:'pending'});setNewTaskStr('');}}} className="dow-accent text-white px-4 py-2 rounded-xl font-black text-sm hover:opacity-90 transition">+</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {selectedAlertCustomer && <CustomerModal customer={selectedAlertCustomer} onClose={()=>setSelectedAlertCustomer(null)} onSave={updateCustomer} onDelete={deleteCustomer}/>}
        </div>
      );
    }

            </div>
          </form>
        </div>
      );
