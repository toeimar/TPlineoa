<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA CRM - Smart Insurance Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700;800&display=swap');

    :root {
      --sunrise: #ff6b35;
      --golden: #f7c948;
      --midday: #3b82f6;
      --afternoon: #8b5cf6;
      --dusk: #ec4899;
      --night: #1e1b4b;
    }

    body { font-family: 'Sarabun', sans-serif; background-color: #f0f4ff; }

    /* ===== TIME-OF-DAY THEME ===== */
    body.theme-morning  { --accent: #ff6b35; --accent2: #f7c948; --grad-from: #fff7ed; --grad-to: #fef3c7; }
    body.theme-daytime  { --accent: #3b82f6; --accent2: #06b6d4; --grad-from: #eff6ff; --grad-to: #ecfeff; }
    body.theme-evening  { --accent: #8b5cf6; --accent2: #ec4899; --grad-from: #f5f3ff; --grad-to: #fdf2f8; }
    body.theme-night    { --accent: #6366f1; --accent2: #a78bfa; --grad-from: #1e1b4b; --grad-to: #312e81; }

    body.theme-night .sidebar-bg  { background: #13103a !important; border-color: #2d2a5e !important; }
    body.theme-night .main-bg     { background: #1e1b4b !important; }
    body.theme-night .card-bg     { background: #2d2a5e !important; border-color: #3d3a7e !important; color: #e0e7ff; }
    body.theme-night .text-main   { color: #e0e7ff !important; }
    body.theme-night .text-sub    { color: #a5b4fc !important; }

    /* ===== DAY-OF-WEEK ACCENT ===== */
    body.dow-0 .dow-accent { background: linear-gradient(135deg,#f97316,#ef4444); }
    body.dow-1 .dow-accent { background: linear-gradient(135deg,#facc15,#f97316); }
    body.dow-2 .dow-accent { background: linear-gradient(135deg,#f472b6,#ec4899); }
    body.dow-3 .dow-accent { background: linear-gradient(135deg,#34d399,#059669); }
    body.dow-4 .dow-accent { background: linear-gradient(135deg,#f59e0b,#f97316); }
    body.dow-5 .dow-accent { background: linear-gradient(135deg,#3b82f6,#6366f1); }
    body.dow-6 .dow-accent { background: linear-gradient(135deg,#ec4899,#8b5cf6); }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ===== TASK CARD GLOW ===== */
    .task-today   { box-shadow: 0 0 0 3px #f97316, 0 4px 20px rgba(249,115,22,0.25); }
    .task-overdue { box-shadow: 0 0 0 3px #ef4444, 0 4px 20px rgba(239,68,68,0.25); }
    .task-future  { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    /* ===== PULSE DOT ===== */
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: currentColor;
      animation: pulse-ring 1.4s cubic-bezier(0.2,0.8,0.2,1) infinite;
    }

    /* ===== HIGHLIGHT BADGE ===== */
    .badge-hot  { background: linear-gradient(135deg,#ff6b35,#f7c948); color: #fff; }
    .badge-warm { background: linear-gradient(135deg,#3b82f6,#06b6d4); color: #fff; }
    .badge-cold { background: linear-gradient(135deg,#94a3b8,#64748b); color: #fff; }

    /* ===== ANIMATE IN ===== */
    @keyframes fadeSlideUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeSlideUp 0.4s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.10s; }
    .fade-up-3 { animation-delay: 0.15s; }
    .fade-up-4 { animation-delay: 0.20s; }
    .fade-up-5 { animation-delay: 0.25s; }

    /* ===== IMAGE ATTACHMENT ===== */
    .attach-thumb {
      width: 80px; height: 80px;
      border-radius: 16px;
      object-fit: cover;
      border: 3px solid #e2e8f0;
      cursor: pointer;
      transition: transform .2s;
    }
    .attach-thumb:hover { transform: scale(1.08); }

    /* ===== LIGHTBOX ===== */
    .lightbox-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-overlay img { max-width: 92vw; max-height: 88vh; border-radius: 24px; }
  </style>

  <script>
    window.MY_FIREBASE_CONFIG = {
      apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
      authDomain: "vitalvibe-c0306.firebaseapp.com",
      projectId: "vitalvibe-c0306",
      storageBucket: "vitalvibe-c0306.firebasestorage.app",
      messagingSenderId: "18887442289",

      measurementId: "G-4DWBTKPNP3"
    };
  </script>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- CONFIG & CONSTANTS ---
    const ADMIN_EMAIL = "toei.mar168@gmail.com";
    const STATUS_LIST = ['ลีดใหม่', 'นัดหมาย', 'เสนอแบบ', 'ติดตามผล', 'ปิดการขาย'];
    const CHART_COLORS = ['#3b82f6', '#f97316', '#10b981', '#8b5cf6', '#ec4899'];
    const DEFAULT_LEAD_SOURCES = ['Facebook Ads', 'Tiktok', 'Walk-in', 'Referral (แนะนำ)'];

    const TELEGRAM_BOT_TOKEN = "8772333460:AAG95AcJZFw8AJrpqJdh8LuPa2z2cDF0w2c";
    const TELEGRAM_CHAT_ID = "-1003760920538";

    // ===== TIME-OF-DAY THEMING =====
    const applyTimeTheme = () => {
      const h = new Date().getHours();
      const d = new Date().getDay();
      const body = document.body;
      body.classList.remove('theme-morning','theme-daytime','theme-evening','theme-night');
      if (h >= 5  && h < 10) body.classList.add('theme-morning');
      else if (h >= 10 && h < 17) body.classList.add('theme-daytime');
      else if (h >= 17 && h < 21) body.classList.add('theme-evening');
      else body.classList.add('theme-night');
      body.classList.remove('dow-0','dow-1','dow-2','dow-3','dow-4','dow-5','dow-6');
      body.classList.add(`dow-${d}`);
    };
    applyTimeTheme();
    setInterval(applyTimeTheme, 60000);

    // --- UTILITIES ---
    const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(val || 0);
    const calculateAge = (dob) => {
      if(!dob) return 0;
      const diff_ms = Date.now() - new Date(dob).getTime();
      const age_dt = new Date(diff_ms);
      return Math.abs(age_dt.getUTCFullYear() - 1970);
    };
    const toBuddhistYear = (dateStr) => {
      if(!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear() + 543}`;
    };
    const getTodayStr = () => new Date().toISOString().split('T')[0];

    // คำนวณวันต่ออายุถัดไปตามรอบชำระ
    const getNextRenewalDate = (startDateStr, cycle) => {
      if(!startDateStr) return null;
      const d = new Date(startDateStr);
      const now = new Date();
      const cycleMonths = { 'รายเดือน': 1, 'ราย 3 เดือน': 3, 'ราย 6 เดือน': 6, 'รายปี': 12 };
      const months = cycleMonths[cycle] || 12;
      while(d <= now) d.setMonth(d.getMonth() + months);
      return d.toISOString().split('T')[0];
    };

    // ===== LEAD SOURCE MANAGER (localStorage) =====
    const getLeadSources = () => {
      try {
        const s = localStorage.getItem('crm_lead_sources');
        return s ? JSON.parse(s) : [...DEFAULT_LEAD_SOURCES];
      } catch { return [...DEFAULT_LEAD_SOURCES]; }
    };
    const saveLeadSources = (arr) => localStorage.setItem('crm_lead_sources', JSON.stringify(arr));

    const Icon = ({ name, size = 20, className = "" }) => <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const IconFill = ({ name, size = 20, className = "" }) => <i className={`ph-fill ph-${name} ${className}`} style={{ fontSize: size }}></i>;

    const notifyTelegram = (message, targetChatId = TELEGRAM_CHAT_ID) => {
      if (!targetChatId) return;
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: targetChatId, text: `🔔 <b>IA CRM Alert</b>\n\n${message}`, parse_mode: "HTML" })
      }).catch(err => console.error("Telegram Error:", err));
    };

    const exportToCSV = (dataList, filename) => {
      if (!dataList || dataList.length === 0) return alert("ไม่มีข้อมูลสำหรับ Export");
      const headers = ['ชื่อ-นามสกุล','เบอร์โทร','Line ID','เพศ','วันเกิด','อายุ','อาชีพ','รายได้','สถานะ','แผนที่สนใจ','เบี้ยประกันรวม','วันที่ติดต่อล่าสุด','แหล่งที่มา','หมายเหตุ'];
      const csvRows = dataList.map(c => {
        const esc = (str) => `"${(str||'').toString().replace(/"/g,'""')}"`;
        return [esc(c.name),`"=""${c.phone||''}"""`,esc(c.lineId),esc(c.gender==='Male'?'ชาย':c.gender==='Female'?'หญิง':c.gender),esc(c.dob),esc(c.age),esc(c.occupation),esc(c.income),esc(c.status),esc(c.interestedPlan),esc(c.premium||0),esc(c.lastContact),esc(c.leadSource),esc((c.note||'').replace(/\n/g,' '))].join(',');
      });
      const csvString = [headers.join(','), ...csvRows].join('\n');
      const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url; link.setAttribute('download', filename);
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    };

    // --- CUSTOM CSS BAR CHART ---
    function CSSBarChart({ data }) {
      const maxCount = Math.max(...data.map(d => d.count), 1);
      return (
        <div className="flex items-end justify-around h-[350px] pt-10 border-b-2 border-slate-100 pb-2">
          {data.map((d, i) => (
            <div key={i} className="flex flex-col items-center w-full group cursor-pointer">
              <div className="relative w-12 md:w-20 rounded-t-xl transition-all duration-700 ease-out flex items-end justify-center pb-2"
                style={{height:`${(d.count/maxCount)*100}%`, minHeight:'30px', backgroundColor:CHART_COLORS[i%CHART_COLORS.length]}}>
                <span className="font-black text-white text-sm">{d.count}</span>
              </div>
              <span className="text-xs md:text-sm font-black text-slate-500 mt-4">{d.name}</span>
            </div>
          ))}
        </div>
      );
    }

    // ===== IMAGE LIGHTBOX =====
    function Lightbox({ src, onClose }) {
      if (!src) return null;
      return (
        <div className="lightbox-overlay" onClick={onClose}>
          <img src={src} alt="preview" onClick={e=>e.stopPropagation()} />
          <button onClick={onClose} className="absolute top-6 right-6 text-white bg-white/20 p-3 rounded-full backdrop-blur-md text-2xl font-black">✕</button>
        </div>
      );
    }

    // ===== IMAGE UPLOAD HELPER (Base64) =====
    const toBase64 = (file) => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    // ============================================================================
    // MAIN APP
    // ============================================================================
    function NovaCRMApp() {
      const [appState, setAppState] = useState('loading');
      const [db, setDb] = useState(null);
      const [toastMsg, setToastMsg] = useState(null);
      const [toastType, setToastType] = useState('success');
      const [users, setUsers] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [currentUser, setCurrentUser] = useState(() => {
        const s = localStorage.getItem('crm_logged_in_user');
        return s ? JSON.parse(s) : null;
      });
      const [currentRoute, setCurrentRoute] = useState('home');
      const [isSidebarOpen, setSidebarOpen] = useState(false);

      const showToast = (msg, type='success') => { setToastMsg(msg); setToastType(type); setTimeout(() => setToastMsg(null), 3500); };

      useEffect(() => {
        let isMounted = true;
        const initSystem = async () => {
          try {
            if (!window.MY_FIREBASE_CONFIG) { if(isMounted) setAppState('ready'); return; }
            if (!firebase.apps.length) firebase.initializeApp(window.MY_FIREBASE_CONFIG);
            const firestoreDb = firebase.firestore();
            setDb(firestoreDb);
            firebase.auth().onAuthStateChanged(user => {
              if(isMounted) {
                if(!user) firebase.auth().signInAnonymously().catch(() => setAppState('ready'));
                else setAppState('ready');
              }
            });
          } catch { if(isMounted) setAppState('ready'); }
        };
        const fallbackTimer = setTimeout(() => { if(isMounted) setAppState(prev => prev==='loading'?'ready':prev); }, 3500);
        initSystem();
        return () => { isMounted = false; clearTimeout(fallbackTimer); };
      }, []);

      useEffect(() => {
        if(!db) return;
        const unsubU = db.collection('crm_users').onSnapshot(snap => { const arr=[]; snap.forEach(d=>arr.push(d.data())); setUsers(arr); });
        const unsubC = db.collection('crm_customers').onSnapshot(snap => { const arr=[]; snap.forEach(d=>arr.push(d.data())); setCustomers(arr); });
        const unsubT = db.collection('crm_tasks').onSnapshot(snap => { const arr=[]; snap.forEach(d=>arr.push(d.data())); setTasks(arr); });
        return () => { unsubU(); unsubC(); unsubT(); };
      }, [db]);

      const writeData = async (col, id, data) => {
        if(db) { try { await db.collection(col).doc(id).set(data); } catch(e) { showToast("พบปัญหาบันทึกข้อมูล",'error'); } }
      };
      const removeData = async (col, id) => { if(db) { try { await db.collection(col).doc(id).delete(); } catch {} } };

      const handleAuthSuccess = async (user) => {
        const isNew = !users.find(u=>u.id===user.id);
        if(isNew) { await writeData('crm_users',user.id,user); notifyTelegram(`👤 <b>ผู้ใช้ใหม่ลงทะเบียน:</b>\nชื่อ: ${user.name}\nทีม: ${user.team} | สิทธิ์: ${user.role}`); }
        else notifyTelegram(`🔑 <b>เข้าสู่ระบบ:</b>\nชื่อ: ${user.name}\nทีม: ${user.team}`);
        localStorage.setItem('crm_logged_in_user', JSON.stringify(user));
        setCurrentUser(user); setCurrentRoute('home');
      };

      const handleUpdateUser = async (updatedUser) => {
        await writeData('crm_users', updatedUser.id, updatedUser);
        if(currentUser && currentUser.id === updatedUser.id) {
          setCurrentUser(updatedUser);
          localStorage.setItem('crm_logged_in_user', JSON.stringify(updatedUser));
        }
        notifyTelegram(`⚙️ <b>อัปเดตข้อมูลผู้ใช้:</b>\nชื่อ: ${updatedUser.name}\nทีม: ${updatedUser.team}\nเป้ายอดขาย: ${formatCurrency(updatedUser.targetRevenue)}`);
      };

      const addCustomer = (data) => {
        writeData('crm_customers', data.id, { ...data, agent_id: currentUser.id });
        showToast('บันทึกข้อมูลลูกค้าสำเร็จ!');
        if(data.status==='ปิดการขาย') notifyTelegram(`🎉 <b>ปิดการขายสำเร็จ!</b>\n${currentUser.name} เพิ่มและปิดการขายลูกค้า: ${data.name}\nยอดเบี้ยรวม: ${formatCurrency(data.premium)}`, TELEGRAM_CHAT_ID);
        else notifyTelegram(`🆕 <b>เพิ่ม Lead ใหม่:</b>\nชื่อ: ${data.name}\nเบอร์โทร: ${data.phone}\nโดย: ${currentUser.name}`);
      };

      const updateCustomer = (data, newlyAddedPolicies=[]) => {
        const old = customers.find(c=>c.id===data.id);
        writeData('crm_customers', data.id, data); showToast('อัปเดตข้อมูลลูกค้าเรียบร้อย!');
        if(old && old.status!=='ปิดการขาย' && data.status==='ปิดการขาย')
          notifyTelegram(`🎉 <b>ปิดการขายสำเร็จ!</b>\n${currentUser.name} เพิ่งปิดการขายลูกค้า: ${data.name}\nยอดเบี้ยรวม: ${formatCurrency(data.premium)}\nแผน: ${data.interestedPlan||'-'}`, TELEGRAM_CHAT_ID);
        else if(newlyAddedPolicies.length>0)
          newlyAddedPolicies.forEach(p => notifyTelegram(`💰 <b>แจ้งเก็บเบี้ยรับใหม่!</b>\nตัวแทน: ${currentUser.name}\nลูกค้า: ${data.name}\nแผน: ${p.planName}\nเบี้ยที่เก็บได้: ${formatCurrency(p.premium)}`, TELEGRAM_CHAT_ID));
      };

      const deleteCustomer = (id) => {
        const c = customers.find(x=>x.id===id);
        removeData('crm_customers', id); showToast('ลบข้อมูลลูกค้าเรียบร้อย!');
        notifyTelegram(`🗑️ <b>ลบข้อมูลลูกค้า:</b>\nชื่อ: ${c?c.name:id}\nโดย: ${currentUser.name}`);
      };

      const addTask = (data) => {
        writeData('crm_tasks', data.id, { ...data, agent_id: currentUser.id }); showToast('เพิ่มงานสำเร็จ!');
        notifyTelegram(`📝 <b>เพิ่มงานใหม่:</b>\nหัวข้อ: ${data.title}\nวันที่: ${data.date}\nโดย: ${currentUser.name}`);
      };

      const toggleTask = (id) => {
        const t = tasks.find(x=>x.id===id);
        if(t) { writeData('crm_tasks', t.id, {...t, status: t.status==='completed'?'pending':'completed'}); notifyTelegram(`✅ <b>อัปเดตสถานะงาน:</b>\nหัวข้อ: ${t.title}\nเป็น: ${t.status==='completed'?'รอดำเนินการ':'เสร็จสิ้น'}\nโดย: ${currentUser.name}`); }
      };

      const removeTask = (id) => {
        const t = tasks.find(x=>x.id===id);
        removeData('crm_tasks', id);
        if(t) notifyTelegram(`❌ <b>ลบงาน:</b>\nหัวข้อ: ${t.title}\nโดย: ${currentUser.name}`);
      };

      if(appState==='loading') return <div className="h-screen w-screen flex flex-col items-center justify-center bg-slate-50"><Icon name="spinner-gap" size={48} className="animate-spin mb-4 text-blue-500"/><p className="font-bold text-slate-400">กำลังเชื่อมต่อฐานข้อมูล...</p></div>;
      if(!currentUser) return <AuthView onSuccess={handleAuthSuccess} users={users}/>;

      return (
        <div className="flex h-screen bg-slate-50 overflow-hidden text-slate-800">
          {/* TOAST */}
          {toastMsg && (
            <div className={`fixed top-6 right-6 z-[200] ${toastType==='error'?'bg-red-500':'bg-emerald-500'} text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 fade-up`}>
              <IconFill name={toastType==='error'?'warning-circle':'check-circle'} size={24}/> <span className="font-black">{toastMsg}</span>
            </div>
          )}

          {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm" onClick={()=>setSidebarOpen(false)}/>}

          <aside className={`sidebar-bg fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 transform ${isSidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none`}>
            <div className="h-24 flex items-center px-8 border-b border-slate-100">
              <div className="flex items-center gap-3">
                <div className="dow-accent p-2.5 rounded-2xl shadow-lg">
                  <Icon name="activity" className="text-white" size={24}/>
                </div>
                <span className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">IA CRM</span>
              </div>
              <button className="lg:hidden ml-auto text-slate-400 bg-slate-100 p-2 rounded-xl" onClick={()=>setSidebarOpen(false)}><Icon name="x" size={20}/></button>
            </div>

            <nav className="flex-1 overflow-y-auto p-5 space-y-2 custom-scrollbar">

    // ===== TIME DISPLAY =====
    function TimeDisplay() {
      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(t); },[]);
      const h = now.getHours();
      const greeting = h<10?'อรุณสวัสดิ์ 🌅':h<17?'สวัสดีตอนบ่าย ☀️':h<21?'สวัสดีตอนเย็น 🌆':'ราตรีสวัสดิ์ 🌙';
      const days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
      const dayColors = ['text-red-500','text-yellow-600','text-pink-500','text-green-600','text-orange-500','text-blue-600','text-purple-600'];
      return (
        <div className="hidden md:flex flex-col items-end">
          <span className={`text-xs font-black uppercase tracking-widest ${dayColors[now.getDay()]}`}>{greeting} | วัน{days[now.getDay()]} {toBuddhistYear(getTodayStr())}</span>
          <span className="text-lg font-black text-slate-700 tabular-nums">{now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
        </div>
      );
    }

    function MenuLink({ icon, label, active, onClick, color, bg, href }) {
      const cls = `w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-black group ${active?`${bg} ${color} border-2 shadow-sm transform scale-[1.02]`:'text-slate-500 hover:bg-slate-50 hover:text-slate-800 border-2 border-transparent'}`;
      const handleNav = (e) => {
        if(onClick) onClick(e);
        try {
          const w = window.open(href,'_blank','noopener,noreferrer');
          if(!w||w.closed||typeof w.closed==='undefined') window.location.href=href;
        } catch { window.location.href=href; }
      };
      if(href) return <button onClick={handleNav} className={cls}><Icon name={icon} size={22} className={`${active?color:'text-slate-400 group-hover:'+color} transition-colors`}/>{label}</button>;
      return <button onClick={onClick} className={cls}><Icon name={icon} size={22} className={`${active?color:'text-slate-400 group-hover:'+color} transition-colors`}/>{label}</button>;
    }

    // ============================================================================
    // AGENT HOME VIEW
    // ============================================================================
    function AgentHomeView({ user, customers, tasks, addTask, toggleTask, removeTask, handleUpdateUser, updateCustomer, deleteCustomer }) {
      const [isEditingTarget, setEditingTarget] = useState(false);
      const [tempTarget, setTempTarget] = useState(user.targetRevenue||100000);
      const [newTaskStr, setNewTaskStr] = useState('');
      const [newTaskDate, setNewTaskDate] = useState(getTodayStr());
      const [newTaskTime, setNewTaskTime] = useState('08:00');
      const [newTaskPriority, setNewTaskPriority] = useState('normal');
      const [selectedAlertCustomer, setSelectedAlertCustomer] = useState(null);
      const [taskView, setTaskView] = useState('list'); // 'list' | 'calendar'
      const [calendarMonth, setCalendarMonth] = useState(new Date());

      const myCustomers = customers.filter(c=>c.agent_id===user.id);
      const myTasks = tasks.filter(t=>t.agent_id===user.id);

      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const monthRev = myCustomers.reduce((acc,c)=>{
        if(c.status==='ปิดการขาย'&&c.closedDate){
          const d=new Date(c.closedDate);
          if(d.getMonth()===currentMonth&&d.getFullYear()===currentYear) return acc+(Number(c.premium)||0);
        }
        return acc;
      },0);
      const progress = Math.min(100,Math.round((monthRev/(user.targetRevenue||1))*100));

      // --- SMART ALERTS ---
      const alerts = useMemo(()=>{
        const arr=[]; const today=new Date();
        myCustomers.forEach(c=>{
          if(c.appointmentDate){
            const diff=Math.ceil((new Date(c.appointmentDate)-today)/(1000*60*60*24));
            if(diff===0) arr.push({title:'นัดพบ/โทร วันนี้!',desc:`คุณมีนัดกับ ${c.name}`,icon:'calendar-check',color:'text-blue-600',bg:'bg-blue-50 border-blue-200',customer:c});
            else if(diff>0&&diff<=3) arr.push({title:'นัดหมายเร็วๆ นี้',desc:`นัด ${c.name} ใน ${diff} วัน (${toBuddhistYear(c.appointmentDate)})`,icon:'clock',color:'text-indigo-600',bg:'bg-indigo-50 border-indigo-200',customer:c});
          }
          if(c.dob){
            const bday=new Date(c.dob); bday.setFullYear(today.getFullYear());
            if(bday<today&&today.getMonth()>bday.getMonth()) bday.setFullYear(today.getFullYear()+1);
            const diff=Math.ceil((bday-today)/(1000*60*60*24));
            if(diff>=0&&diff<=7) arr.push({title:'วันเกิดลูกค้า',desc:`${c.name} ครบรอบวันเกิดในอีก ${diff} วัน`,icon:'gift',color:'text-pink-600',bg:'bg-pink-50 border-pink-200',customer:c});
          }
          if(c.policies){
            c.policies.forEach(p=>{
              // ใช้ nextRenewal ถ้ามี ไม่งั้นใช้ endDate เดิม
              const renewDate = p.nextRenewal || p.endDate;
              const diff=Math.ceil((new Date(renewDate)-today)/(1000*60*60*24));
              if(diff>=0&&diff<=30) arr.push({title:'แจ้งเตือนต่ออายุ',desc:`กรมธรรม์ ${p.planName} ของ ${c.name} จะต้องต่ออายุใน ${diff} วัน (${toBuddhistYear(renewDate)})`,icon:'file-text',color:'text-orange-600',bg:'bg-orange-50 border-orange-200',customer:c});
            });
          }
          if(c.status!=='ปิดการขาย'&&c.lastContact){
            const diff=Math.ceil((today-new Date(c.lastContact))/(1000*60*60*24));
            if(diff>30) arr.push({title:'Lead ไม่มีการอัปเดต',desc:`${c.name} ขาดการติดต่อนาน ${diff} วันแล้ว`,icon:'warning-circle',color:'text-red-600',bg:'bg-red-50 border-red-200',customer:c});
          }
          if(c.status==='ปิดการขาย'&&c.closedDate){
            const diff=Math.ceil((today-new Date(c.closedDate))/(1000*60*60*24));
            if(diff>=90&&diff<=95) arr.push({title:'ดูแลหลังการขาย (Aftercare)',desc:`ปิดการขาย ${c.name} ครบ 3 เดือนแล้ว โทรไปทักทายหน่อย`,icon:'phone-call',color:'text-emerald-600',bg:'bg-emerald-50 border-emerald-200',customer:c});
          }
        });
        return arr;
      },[myCustomers]);

      // --- TELEGRAM DAILY DIGEST ---
      const todaysTasks = useMemo(()=>myTasks.filter(t=>t.date===getTodayStr()&&t.status!=='completed'),[myTasks]);

      useEffect(()=>{
        if(alerts.length>0||todaysTasks.length>0){
          const todayStr=getTodayStr();
          const storageKey=`telegram_notified_${user.id}_${todayStr}`;
          if(!localStorage.getItem(storageKey)){
            const inactiveAlerts=alerts.filter(a=>a.title==='Lead ไม่มีการอัปเดต');
            const otherAlerts=alerts.filter(a=>a.title!=='Lead ไม่มีการอัปเดต');
            if(todaysTasks.length>0||otherAlerts.length>0){
              let msg=`📅 <b>สรุปงานและแจ้งเตือนประจำวัน</b>\nคุณ: ${user.name}\n\n`;
              if(todaysTasks.length>0){ msg+=`📝 <b>สิ่งที่ต้องทำวันนี้ (Tasks):</b>\n`; todaysTasks.forEach(t=>{msg+=`• [ ] ${t.title}\n`;}); msg+=`\n`; }
              if(otherAlerts.length>0){ msg+=`💡 <b>Smart Alerts:</b>\n`; otherAlerts.forEach(a=>{msg+=`• <b>${a.title}:</b> ${a.desc}\n`;}); }
              msg+=`\n<i>เข้าสู่ระบบ IA CRM เพื่อจัดการงานวันนี้เลย!</i>`;
              notifyTelegram(msg, user.telegramChatId||TELEGRAM_CHAT_ID);
            }
            if(inactiveAlerts.length>0){
              let msg=`⚠️ <b>แจ้งเตือนลูกค้าขาดการติดต่อ (เกิน 30 วัน)</b>\n👤 ตัวแทน: ${user.name}\n\n`;
              inactiveAlerts.forEach(a=>{msg+=`• ${a.desc}\n`;});
              msg+=`\n<i>กรุณาอัปเดตการดูแลลูกค้าในระบบด่วน!</i>`;
              notifyTelegram(msg, TELEGRAM_CHAT_ID);
            }
            localStorage.setItem(storageKey,'true');
          }
        }
      },[alerts,todaysTasks,user.id,user.name,user.telegramChatId]);

      // ===== SCHEDULED TELEGRAM at 08:00 and 19:00 =====
      useEffect(()=>{
        const checkScheduledNotify = () => {
          const now = new Date();
          const hhmm = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
          const dateStr = getTodayStr();
          const key08 = `sched_08_${user.id}_${dateStr}`;
          const key19 = `sched_19_${user.id}_${dateStr}`;

          const pendingTasks = myTasks.filter(t=>t.status!=='completed'&&t.date===dateStr);
          const buildMsg = (label) => {
            let msg=`⏰ <b>${label} - Daily Digest</b>\n👤 ${user.name}\n\n`;
            if(pendingTasks.length>0){
              msg+=`📋 <b>งานที่ยังค้างวันนี้ (${pendingTasks.length} รายการ):</b>\n`;
              pendingTasks.forEach(t=>{
                const pri = t.priority==='high'?'🔴':t.priority==='low'?'🟢':'🟡';
                msg+=`${pri} ${t.title}${t.time?` (${t.time})`:''}\n`;
              });
            } else { msg+=`✅ ไม่มีงานค้างวันนี้\n`; }
            const todayAlerts = alerts.filter(a=>a.title!=='Lead ไม่มีการอัปเดต');
            if(todayAlerts.length>0){
              msg+=`\n💡 <b>Smart Alerts (${todayAlerts.length}):</b>\n`;
              todayAlerts.slice(0,5).forEach(a=>{msg+=`• ${a.title}: ${a.desc}\n`;});
            }
            msg+=`\n<i>IA CRM - ขอให้มีวันที่ดี! 💪</i>`;
            return msg;
          };

          if(hhmm==='08:00' && !localStorage.getItem(key08)){
            notifyTelegram(buildMsg('🌅 สวัสดีตอนเช้า'), user.telegramChatId||TELEGRAM_CHAT_ID);
            localStorage.setItem(key08,'true');
          }
          if(hhmm==='19:00' && !localStorage.getItem(key19)){
            notifyTelegram(buildMsg('🌆 สรุปงานตอนเย็น'), user.telegramChatId||TELEGRAM_CHAT_ID);
            localStorage.setItem(key19,'true');
          }
        };
        checkScheduledNotify();
        const interval = setInterval(checkScheduledNotify, 30000); // เช็คทุก 30 วิ
        return ()=>clearInterval(interval);
      },[myTasks,alerts,user]);

      // ===== CALENDAR HELPERS =====
      const getDaysInMonth = (year,month) => new Date(year,month+1,0).getDate();
      const getFirstDayOfMonth = (year,month) => new Date(year,month,1).getDay();
      const tasksByDate = useMemo(()=>{
        const map={};
        myTasks.forEach(t=>{ if(!map[t.date]) map[t.date]=[]; map[t.date].push(t); });
        return map;
      },[myTasks]);

      const priorityConfig = {

                    <button onClick={()=>{if(newTaskStr){addTask({id:Date.now().toString(),title:newTaskStr,date:newTaskDate,time:newTaskTime,priority:newTaskPriority,status:'pending'});setNewTaskStr('');}}} className="dow-accent text-white px-6 py-3 rounded-xl font-black text-sm hover:opacity-90 transition">เพิ่ม</button>
                  </div>
                </div>
              </div>

              {/* TASK LIST VIEW */}
              {taskView==='list' && (

                  {myTasks.sort((a,b)=>{
                    if(a.status==='completed'&&b.status!=='completed') return 1;
                    if(b.status==='completed'&&a.status!=='completed') return -1;
                    return new Date(a.date+(a.time?'T'+a.time:'')) - new Date(b.date+(b.time?'T'+b.time:''));
                  }).map(t=>{
                    const cfg = priorityConfig[t.priority||'normal'];
                    const today = getTodayStr();
                    const isOverdue = t.date<today && t.status!=='completed';
                    const isToday = t.date===today && t.status!=='completed';
                    return (
                      <div key={t.id} className={`flex items-start justify-between p-5 rounded-2xl border-2 transition-all group ${t.status==='completed'?'bg-slate-100 border-slate-200 opacity-50':'bg-white '+cfg.border+' '+getTaskCardClass(t)}`}>

                          </button>
                          <div className="flex-1 min-w-0">
                            <div className="flex flex-wrap items-center gap-2 mb-1">
                              <span className={`font-black text-base ${t.status==='completed'?'line-through text-slate-400':'text-slate-800'}`}>{t.title}</span>
                              <span className={`text-[10px] font-black px-2 py-0.5 rounded-md ${cfg.badge}`}>{cfg.label}</span>

                              {isToday && <span className="text-[10px] font-black px-2 py-0.5 rounded-md bg-orange-500 text-white">วันนี้</span>}

        familyStatus:'โสด', children:0, hasOldPolicy:false, oldPremium:0, oldPolicyDetails:'',

      const handleChange = (e) => {
        const {name,value,type,checked}=e.target;
        const newVal=type==='checkbox'?checked:value;
        if(name==='dob') setFormData(prev=>({...prev,[name]:newVal,age:calculateAge(newVal)}));
        else setFormData(prev=>({...prev,[name]:newVal}));
      };

      const addLeadSource = () => {
        if(!newSourceInput.trim()) return;
        const updated=[...leadSources,newSourceInput.trim()];
        setLeadSources(updated); saveLeadSources(updated);
        setFormData(prev=>({...prev,leadSource:newSourceInput.trim()}));
        setNewSourceInput(''); setShowAddSource(false);
      };

      const removeLeadSource = (src) => {
        const updated=leadSources.filter(s=>s!==src);

        e.preventDefault();

                      <button type="button" onClick={addLeadSource} className="px-4 py-2 bg-blue-600 text-white rounded-xl font-black text-sm hover:bg-blue-700 transition">เพิ่ม</button>

    // ============================================================================
    // CUSTOMERS VIEW
    // ============================================================================
    function CustomersView({ user, customers, updateCustomer, deleteCustomer }) {
      const [activeTab, setActiveTab] = useState('ทั้งหมด');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedCustomer, setSelectedCustomer] = useState(null);

      const myCustomers = customers.filter(c=>c.agent_id===user.id);
      const filtered = myCustomers.filter(c=>{
        const matchSearch=(c.name||'').toLowerCase().includes(searchTerm.toLowerCase())||(c.phone||'').includes(searchTerm);
        let matchStatus=false;
        if(activeTab==='ทั้งหมด') matchStatus=true;
        else if(activeTab==='ขาดการติดต่อ'){
          const diff=c.lastContact?Math.ceil((new Date()-new Date(c.lastContact))/(1000*60*60*24)):0;
          matchStatus=diff>30&&c.status!=='ปิดการขาย';
        } else matchStatus=c.status===activeTab;
        return matchSearch&&matchStatus;
      });

      return (
        <div className="space-y-8 fade-up">
          <div className="flex flex-col md:flex-row justify-between md:items-end gap-6 mb-4">
            <div>
              <h2 className="text-4xl font-black text-slate-800 flex items-center gap-3"><Icon name="database" className="text-emerald-500" size={40}/> ฐานข้อมูลลูกค้า</h2>
              <p className="text-slate-500 font-bold mt-2 uppercase tracking-widest text-sm">ค้นหา กรอง และจัดการข้อมูลลูกค้าในมือคุณ</p>
            </div>
            <div className="flex gap-3 w-full md:w-auto">
              <div className="relative flex-1 md:w-96"><Icon name="magnifying-glass" className="absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-400" size={20}/><input type="text" placeholder="ค้นหาชื่อ, เบอร์โทร..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full pl-14 pr-5 py-4 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none shadow-sm font-black"/></div>
              <button onClick={()=>exportToCSV(filtered,`Customers_${user.name}.csv`)} className="bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white border-2 border-emerald-200 hover:border-emerald-500 px-5 py-4 rounded-2xl font-black shadow-sm transition flex items-center justify-center gap-2 whitespace-nowrap" title="Export เป็นไฟล์ Excel"><Icon name="file-csv" size={24}/><span className="hidden sm:inline">Export CSV</span></button>
            </div>
          </div>

          <div className="flex overflow-x-auto custom-scrollbar gap-3 pb-4">
            {['ทั้งหมด',...STATUS_LIST,'ขาดการติดต่อ'].map(tab=>{
              let count=0;
              if(tab==='ทั้งหมด') count=myCustomers.length;
              else if(tab==='ขาดการติดต่อ') count=myCustomers.filter(c=>{const diff=c.lastContact?Math.ceil((new Date()-new Date(c.lastContact))/(1000*60*60*24)):0;return diff>30&&c.status!=='ปิดการขาย';}).length;
              else count=myCustomers.filter(c=>c.status===tab).length;
              return (
                <button key={tab} onClick={()=>setActiveTab(tab)} className={`px-8 py-3.5 rounded-2xl font-black whitespace-nowrap transition-all border-2 text-sm ${activeTab===tab?(tab==='ขาดการติดต่อ'?'bg-red-500 text-white border-red-500 shadow-xl transform -translate-y-1':'dow-accent text-white border-transparent shadow-xl transform -translate-y-1'):'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                  {tab} <span className={`ml-3 px-3 py-1 rounded-lg text-xs font-black ${activeTab===tab?'bg-white/20 text-white':'bg-slate-100 text-slate-500'}`}>{count}</span>
                </button>
              );
            })}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            {filtered.map((c,ci)=>(
              <div key={c.id} className={`bg-white rounded-[2.5rem] p-8 border-2 border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all relative overflow-hidden group fade-up`} style={{animationDelay:`${ci*0.04}s`}}>
                <div className={`absolute top-0 right-0 w-24 h-24 rounded-bl-full -mr-4 -mt-4 opacity-20 ${c.status==='ปิดการขาย'?'bg-emerald-500':c.status==='ลีดใหม่'?'bg-blue-500':'bg-orange-500'}`}></div>
                <div className="flex justify-between items-start mb-6 relative z-10">
                  <div className="flex items-center gap-4">
                    <div className="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center font-black text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors text-xl">{(c.name||'?').charAt(0)}</div>
                    <div><h3 className="font-black text-xl text-slate-800">{c.name}</h3><p className="text-sm text-slate-500 flex items-center gap-1.5 mt-1 font-bold"><Icon name="phone" size={14}/>{c.phone}</p></div>
                  </div>
                </div>
                <div className="mb-6"><span className={`inline-block px-4 py-1.5 rounded-xl text-xs font-black border-2 uppercase tracking-widest ${c.status==='ปิดการขาย'?'bg-emerald-50 border-emerald-200 text-emerald-700':c.status==='ลีดใหม่'?'bg-blue-50 border-blue-200 text-blue-700':c.status==='เสนอแบบ'?'bg-purple-50 border-purple-200 text-purple-700':'bg-orange-50 border-orange-200 text-orange-700'}`}>{c.status}</span></div>
                <div className="space-y-3 mb-8 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                  <div className="flex justify-between text-sm border-b border-slate-200 pb-3"><span className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">นัดล่าสุด</span><span className="font-black text-slate-800">{c.appointmentDate?toBuddhistYear(c.appointmentDate):'-'}</span></div>
                  <div className="flex justify-between text-sm border-b border-slate-200 pb-3"><span className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">AI Score</span><span className="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-600 text-lg">{c.ai_score||0}/100</span></div>
                  <div className="flex justify-between text-sm items-center"><span className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">แผนที่สนใจ</span><span className="font-black text-blue-600 truncate max-w-[140px] text-right">{c.interestedPlan||'-'}</span></div>
                </div>
                <button onClick={()=>setSelectedCustomer(c)} className="w-full py-4 bg-white hover:bg-blue-50 text-blue-600 font-black rounded-2xl transition border-2 border-slate-200 hover:border-blue-300 flex items-center justify-center gap-2">ดู / แก้ไขข้อมูล <Icon name="caret-right" size={18}/></button>
              </div>
            ))}
            {filtered.length===0 && <div className="col-span-full bg-white p-20 rounded-[3rem] text-center border-2 border-slate-100"><Icon name="database" size={80} className="mx-auto text-slate-200 mb-6"/><h3 className="text-3xl font-black text-slate-600">ไม่พบข้อมูลลูกค้า</h3></div>}
          </div>

          {selectedCustomer && <CustomerModal customer={selectedCustomer} onClose={()=>setSelectedCustomer(null)} onSave={updateCustomer} onDelete={deleteCustomer}/>}
        </div>
      );
    }

    // ============================================================================
    // CUSTOMER MODAL (ENHANCED)
    // ============================================================================
    function CustomerModal({ customer, onClose, onSave, onDelete }) {
      const [formData, setFormData] = useState({...customer});
      const [isAddingPolicy, setIsAddingPolicy] = useState(false);
      const [newPolicy, setNewPolicy] = useState({planName:'',policyNo:'',cycle:'รายปี',contractDate:'',endDate:'',premium:''});
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [aiInsight, setAiInsight] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(false);
      const [newlyAddedPoliciesForAlert, setNewlyAddedPoliciesForAlert] = useState([]);
      const [newCareNote, setNewCareNote] = useState('');
      const [lightboxSrc, setLightboxSrc] = useState(null);
      const fileInputRef = useRef(null);

      // ===== Lead Sources in modal =====
      const [leadSources] = useState(getLeadSources());

      const handleChange = (e) => {
        const {name,value,type,checked}=e.target;
        const newVal=type==='checkbox'?checked:value;
        if(name==='dob') setFormData(prev=>({...prev,[name]:newVal,age:calculateAge(newVal)}));
        else setFormData(prev=>({...prev,[name]:newVal}));
      };

      const handleSave = () => {
        if(formData.status==='ปิดการขาย'&&customer.status!=='ปิดการขาย') formData.closedDate=getTodayStr();
        if(!formData.lastContact) formData.lastContact=getTodayStr();
        onSave(formData, newlyAddedPoliciesForAlert); onClose();
      };

      // ===== IMAGE ATTACHMENT =====
      const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        for(const file of files){
          if(!file.type.startsWith('image/')) continue;
          const b64 = await toBase64(file);
          setFormData(prev=>({...prev, attachments:[...(prev.attachments||[]),{name:file.name,data:b64,date:getTodayStr()}]}));
        }
      };

      const removeAttachment = (idx) => {
        setFormData(prev=>({...prev,attachments:(prev.attachments||[]).filter((_,i)=>i!==idx)}));
      };

      // ===== POLICY =====
      const handleAddPolicy = () => {
        if(!newPolicy.planName||!newPolicy.contractDate) return alert("กรุณากรอกชื่อแผนและวันทำสัญญา");
        const parsedPremium=Number(newPolicy.premium||0);
        // คำนวณวันต่ออายุถัดไปจาก contractDate + cycle
        const nextRenewal = getNextRenewalDate(newPolicy.contractDate, newPolicy.cycle);
        const policyToAdd={...newPolicy,premium:parsedPremium,nextRenewal};
        setFormData(prev=>({...prev,premium:Number(prev.premium||0)+parsedPremium,policies:[...(prev.policies||[]),policyToAdd]}));
        setNewlyAddedPoliciesForAlert(prev=>[...prev,policyToAdd]);
        setIsAddingPolicy(false);
        setNewPolicy({planName:'',policyNo:'',cycle:'รายปี',contractDate:'',endDate:'',premium:''});
      };

      const handleAddCareNote = () => {
        if(!newCareNote.trim()) return alert("กรุณากรอกรายละเอียดการติดต่อ");
        const newHistory=[...(formData.careHistory||[]),{date:getTodayStr(),note:newCareNote.trim()}];
        setFormData(prev=>({...prev,careHistory:newHistory,lastContact:getTodayStr()}));
        setNewCareNote('');
      };

      const generateAiInsight = () => {
        setIsAiLoading(true);
        setTimeout(()=>{
          let insight="";
          if(formData.status==='ปิดการขาย') insight=`AI (Aftercare): ลูกค้าปิดการขายแผน ${formData.interestedPlan} ไปแล้ว แนะนำให้รักษาสัมพันธ์และนำเสนอแผนควบการลงทุนเพิ่มเติมในปีหน้า`;
          else if(formData.status==='นัดหมาย') insight=`AI (Closing Strategy): ลูกค้ามีรายได้ ${formData.income} และสนใจแผน ${formData.interestedPlan} มีโอกาสปิดการขาย 85% เตรียมข้อมูลเรื่องภาษีไปนำเสนอเพิ่มเติม`;
          else insight=`AI วิเคราะห์: ลูกค้ามีสถานะ ${formData.status} แนะนำให้ส่งบทความสั้นๆ ทาง Line (${formData.lineId||'เบอร์โทร'}) ก่อนโทรคุย`;
          setAiInsight(insight); setIsAiLoading(false);
        },1500);
      };

      return (
        <>
          <Lightbox src={lightboxSrc} onClose={()=>setLightboxSrc(null)}/>
          <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4 sm:p-6">
            <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden fade-up">
              <div className="px-10 py-6 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                <div><h2 className="text-3xl font-black text-slate-800">{formData.name}</h2><p className="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">จัดการข้อมูลและอัปเดตสถานะการขาย</p></div>
                <button onClick={onClose} className="text-slate-400 hover:bg-slate-100 p-3 rounded-2xl transition"><Icon name="x" size={24}/></button>
              </div>

              <div className="flex-1 overflow-y-auto p-6 lg:p-10 space-y-10 custom-scrollbar bg-slate-50/50">
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  <div className="lg:col-span-2 space-y-10">

                    {/* QUICK STATUS */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                      <div className="space-y-3"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ปรับสถานะ</label><select name="status" value={formData.status} onChange={handleChange} className="w-full px-5 py-4 border-2 border-blue-200 rounded-2xl bg-blue-50 font-black text-blue-800 outline-none text-lg">{STATUS_LIST.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                      <div className="space-y-3"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">ยอดขายรวม</label><input type="number" name="premium" value={formData.premium} onChange={handleChange} className="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-lg text-slate-800"/></div>
                      <div className="space-y-3"><label className="block text-xs font-black text-slate-400 uppercase tracking-widest">วันนัดหมายต่อไป</label><input type="date" name="appointmentDate" value={formData.appointmentDate} onChange={handleChange} className="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-700"/></div>
                      <div className="space-y-3">
                        <label className="block text-xs font-black text-slate-400 uppercase tracking-widest">วันที่ติดต่อล่าสุด</label>
                        <div className="flex gap-2">
                          <input type="date" name="lastContact" value={formData.lastContact||''} onChange={handleChange} className="w-full px-3 py-4 border-2 border-slate-200 rounded-2xl bg-slate-50 outline-none font-black text-slate-700"/>
                          <button type="button" onClick={()=>setFormData(prev=>({...prev,lastContact:getTodayStr()}))} className="bg-blue-50 border-2 border-blue-100 text-blue-600 px-3 rounded-2xl font-black hover:bg-blue-100 transition" title="วันนี้"><Icon name="arrows-clockwise" size={20}/></button>
                        </div>
                      </div>
                    </div>

                    {/* EDITABLE DETAILS */}
                    <div className="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-sm">
                      <h3 className="font-black text-slate-800 mb-6 text-2xl border-b-2 border-slate-100 pb-4 flex items-center gap-3"><Icon name="user" size={28} className="text-blue-500"/> ข้อมูลรายละเอียดลูกค้า</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div className="space-y-2"><label className="block text-xs font-black text-slate-400">ชื่อ-นามสกุล</label><input type="text" name="name" value={formData.name||''} onChange={handleChange} className="w-full px-4 py-3 border-2 rounded-xl bg-slate-50 font-black"/></div>

    // ============================================================================

    function PipelineView({ customers }) {
      return (
        <div className="space-y-8 h-[calc(100vh-160px)] flex flex-col fade-up">

          <div className="flex gap-6 overflow-x-auto pb-6 custom-scrollbar flex-1 items-start">
            {STATUS_LIST.map((status,idx)=>{
              const list=customers.filter(c=>c.status===status);
              return (
                <div key={status} className="bg-slate-100/70 rounded-[2.5rem] p-6 min-w-[340px] w-[340px] border-2 border-slate-200/50 max-h-full overflow-y-auto custom-scrollbar shadow-inner">
                  <h3 className="font-black text-slate-700 mb-6 flex justify-between items-center text-xl">{status}<span className="bg-white px-3.5 py-1 rounded-xl text-sm shadow-sm">{list.length}</span></h3>
                  <div className="space-y-4">
                    {list.map(c=>(
                      <div key={c.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 border-l-8 hover:shadow-md transition-all cursor-pointer transform hover:-translate-y-1" style={{borderLeftColor:CHART_COLORS[idx%CHART_COLORS.length]}}>
                        <p className="font-black text-lg text-slate-800">{c.name}</p>
                        <p className="text-xs font-bold text-slate-400 mt-2 flex items-center gap-1.5"><Icon name="phone" size={12}/>{c.phone}</p>
                        <div className="mt-4 pt-4 border-t border-slate-50"><p className="text-sm font-black text-slate-600 truncate">{c.interestedPlan||'รอระบุแผน'}</p>{c.premium>0&&<p className="text-sm font-black text-emerald-600 mt-2 bg-emerald-50 w-fit px-3 py-1 rounded-xl">{formatCurrency(c.premium)}</p>}</div>
                      </div>
                    ))}
                    {list.length===0&&<div className="border-2 border-dashed border-slate-300 rounded-[2rem] p-8 text-center text-slate-400 font-black">ไม่มีข้อมูล</div>}

              );

    // ============================================================================
    // ANALYTICS VIEW
    // ============================================================================
    function AnalyticsView({ customers }) {
      const currentMonth=new Date().getMonth(); const currentYear=new Date().getFullYear();
      const closedThisMonth=customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getMonth()===currentMonth);
      const revThisMonth=closedThisMonth.reduce((acc,c)=>acc+Number(c.premium||0),0);
      const avgCase=closedThisMonth.length?Math.round(revThisMonth/closedThisMonth.length):0;
      const convRate=customers.length?Math.round((customers.filter(c=>c.status==='ปิดการขาย').length/customers.length)*100):0;
      const closedThisYear=customers.filter(c=>c.status==='ปิดการขาย'&&c.closedDate&&new Date(c.closedDate).getFullYear()===currentYear);
      const revThisYear=closedThisYear.reduce((acc,c)=>acc+Number(c.premium||0),0);
      const monthlyData=new Array(12).fill(0);
      closedThisYear.forEach(c=>{monthlyData[new Date(c.closedDate).getMonth()]+=Number(c.premium||0);});
      const bestMonthVal=Math.max(...monthlyData); const bestMonthIndex=monthlyData.indexOf(bestMonthVal);
      const monthNames=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const bestMonthName=bestMonthVal>0?monthNames[bestMonthIndex]:'-';
      const prevMonthRev=currentMonth>0?monthlyData[currentMonth-1]:0;
      let growth=0; if(prevMonthRev>0) growth=Math.round(((revThisMonth-prevMonthRev)/prevMonthRev)*100); else if(revThisMonth>0) growth=100;
      const kpis=[
        {title:'รายได้เดือนนี้',val:formatCurrency(revThisMonth),color:'text-emerald-600',bg:'bg-emerald-50',border:'border-emerald-100'},
        {title:'รายได้รวมทั้งปี',val:formatCurrency(revThisYear),color:'text-indigo-600',bg:'bg-indigo-50',border:'border-indigo-100'},
        {title:'เคสที่ปิดได้ (ด)',val:`${closedThisMonth.length} เคส`,color:'text-blue-600',bg:'bg-blue-50',border:'border-blue-100'},
        {title:'เฉลี่ยต่อเคส (ด)',val:formatCurrency(avgCase),color:'text-purple-600',bg:'bg-purple-50',border:'border-purple-100'},
        {title:'Conversion Rate',val:`${convRate}%`,color:'text-orange-600',bg:'bg-orange-50',border:'border-orange-100'},
        {title:'Best Month',val:bestMonthName,color:'text-pink-600',bg:'bg-pink-50',border:'border-pink-100'},
        {title:'Growth (YoM)',val:`${growth>0?'+'+growth:growth}%`,color:growth>=0?'text-emerald-600':'text-red-600',bg:growth>=0?'bg-emerald-50':'bg-red-50',border:growth>=0?'border-emerald-100':'border-red-100'},
      ];
      const chartData=STATUS_LIST.map(s=>({name:s,count:customers.filter(c=>c.status===s).length}));
      return (
        <div className="space-y-10 fade-up">

    // ============================================================================
    // AI ASSISTANT VIEW
    // ============================================================================
    function AIAssistantView() {
      const [inputText,setInputText]=useState('');
      const [messages,setMessages]=useState([]);
      const [isLoading,setIsLoading]=useState(false);
      const messagesEndRef=useRef(null);
      useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages,isLoading]);
      const handleSend=async()=>{
        if(!inputText.trim()||isLoading) return;
        const userMsg=inputText.trim(); setInputText('');
        setMessages(prev=>[...prev,{role:'user',text:userMsg}]); setIsLoading(true);
        try {
          const apiKey="AIzaSyDbHog1AJB9nmrPvQtBefDIeF-uy_y4XjU";
          const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
          const payload={contents:[{parts:[{text:userMsg}]}],systemInstruction:{parts:[{text:"คุณคือ AI ผู้ช่วยสำหรับตัวแทนขายประกันภัยในระบบ IA CRM ให้คำแนะนำเกี่ยวกับการปิดการขาย สร้างสคริปต์การโทร ตอบข้อโต้แย้ง และวิเคราะห์ข้อมูลลูกค้า ตอบเป็นภาษาไทยด้วยความสุภาพ มืออาชีพ และกระชับเข้าใจง่าย ใช้ Markdown ในการจัดรูปแบบข้อความให้สวยงามได้"}]}};
          const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
          const data=await res.json();
          if(!res.ok) throw new Error(data.error?.message||'API Error');
          const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'ขออภัย ไม่สามารถประมวลผลได้ในขณะนี้';
          setMessages(prev=>[...prev,{role:'model',text:reply}]);
        } catch {
          setMessages(prev=>[...prev,{role:'model',text:'ขออภัย ระบบ AI ไม่สามารถตอบกลับได้ในขณะนี้'}]);
        } finally { setIsLoading(false); }
      };
      const formatMessage=(text)=>({__html:text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')});
      return (
        <div className="max-w-4xl mx-auto space-y-8 flex flex-col h-[calc(100vh-160px)] fade-up">
          <div className="bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 rounded-[3rem] p-8 lg:p-12 shadow-2xl text-white relative overflow-hidden flex flex-col flex-1 min-h-0 border border-indigo-500/20">
            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-white/5 rounded-full blur-3xl -mt-40 -mr-40 pointer-events-none"></div>
            {messages.length===0?(
              <div className="flex-1 flex flex-col items-center justify-center text-center relative z-10 animate-in fade-in zoom-in duration-500">
                <Icon name="brain" size={80} className="mx-auto mb-8 text-indigo-300 animate-pulse drop-shadow-[0_0_15px_rgba(165,180,252,0.5)]"/>
                <h2 className="text-4xl lg:text-5xl font-black mb-4 tracking-tight">IA AI Assistant</h2>
                <p className="text-indigo-200 font-bold text-lg max-w-xl mx-auto leading-relaxed">พิมพ์ปรึกษา AI ผู้ช่วยได้เลย!<br/>เช่น "ขอสคริปต์โทรหาลูกค้าเก่า", "วิธีตอบข้อโต้แย้งเรื่องเบี้ยแพง", หรือ "ช่วยคิดแผนประกันสำหรับคนอายุ 30"</p>
              </div>
            ):(
              <div className="flex-1 overflow-y-auto mb-6 pr-2 space-y-6 custom-scrollbar relative z-10">
                {messages.map((msg,idx)=>(
                  <div key={idx} className={`flex flex-col ${msg.role==='user'?'items-end':'items-start'} animate-in slide-in-from-bottom-2 fade-in duration-300`}>
                    <div className={`max-w-[85%] p-5 rounded-3xl ${msg.role==='user'?'bg-indigo-500 text-white rounded-br-sm shadow-md':'bg-white/10 text-indigo-50 rounded-bl-sm border border-white/10 backdrop-blur-md shadow-inner'}`}>
                      {msg.role==='model'&&<Icon name="sparkle" className="text-indigo-300 mb-2" size={20}/>}
                      <p className="whitespace-pre-wrap font-medium leading-relaxed" dangerouslySetInnerHTML={formatMessage(msg.text)}></p>
                    </div>
                  </div>
                ))}
                {isLoading&&(<div className="flex flex-col items-start"><div className="max-w-[85%] p-4 rounded-3xl bg-white/10 text-indigo-50 rounded-bl-sm border border-white/10 backdrop-blur-md flex items-center gap-3"><Icon name="circle-notch" className="animate-spin text-indigo-300" size={20}/><span className="font-bold text-indigo-200">AI กำลังวิเคราะห์ข้อมูล...</span></div></div>)}
                <div ref={messagesEndRef}/>
              </div>
            )}
            <form onSubmit={e=>{e.preventDefault();handleSend();}} className="mt-auto bg-white/10 p-3 rounded-3xl flex flex-col md:flex-row gap-3 backdrop-blur-xl border border-white/20 relative z-10 shadow-inner shrink-0">
              <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} disabled={isLoading} placeholder="พิมพ์ข้อความปรึกษา AI ที่นี่..." className="flex-1 bg-transparent border-none text-white outline-none placeholder-indigo-300/70 font-bold px-5 py-3"/>
              <button type="submit" disabled={isLoading||!inputText.trim()} className="bg-indigo-500 px-8 py-3 rounded-2xl font-black hover:bg-indigo-400 shadow-lg transition text-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">ส่ง <Icon name="paper-plane-right"/></button>
            </form>
          </div>
        </div>
      );
    }

              <div>
                <label className="text-xs font-black block mb-2 text-slate-400">Telegram Chat ID (รับแจ้งเตือนส่วนตัว)</label>
                <p className="text-xs text-slate-400 mb-2 font-bold">⏰ ระบบจะส่งสรุปงานอัตโนมัติทุกวัน เวลา <span className="text-orange-500 font-black">08:00</span> และ <span className="text-purple-500 font-black">19:00</span> น.</p>
                <div className="flex gap-2">
                  <input type="text" placeholder="เช่น 123456789" value={formData.telegramChatId} onChange={e=>setFormData({...formData,telegramChatId:e.target.value})} className="flex-1 border-2 rounded-xl px-5 py-4 font-bold outline-none focus:border-blue-500"/>
                  <button type="button" onClick={testTelegramNotification} className="bg-blue-100 text-blue-600 px-6 rounded-xl font-black hover:bg-blue-200 transition">ทดสอบ</button>
                </div>
              </div>
              <button onClick={()=>{handleUpdateUser({...user,...formData});showToast('บันทึกการตั้งค่าโปรไฟล์เรียบร้อย!');}} className="w-full py-4 dow-accent text-white rounded-xl font-black text-lg hover:opacity-90 transition mt-4">บันทึกการเปลี่ยนแปลง</button>
            </div>
          </div>

          {/* LEAD SOURCE MANAGER */}
          <div className="p-10 bg-white rounded-[3rem] shadow-sm border border-slate-100">
            <h3 className="text-2xl font-black mb-6 flex items-center gap-3"><Icon name="funnel" className="text-purple-500" size={28}/> จัดการแหล่งที่มา (Lead Source)</h3>
            <div className="flex gap-3 mb-6">
              <input type="text" placeholder="เพิ่มแหล่งที่มาใหม่..." value={newSrc} onChange={e=>setNewSrc(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addSrc();}} className="flex-1 border-2 rounded-xl px-5 py-4 font-bold outline-none focus:border-purple-400"/>
              <button onClick={addSrc} className="px-6 py-3 bg-purple-600 text-white rounded-xl font-black hover:bg-purple-700 transition shadow-md">เพิ่ม</button>
            </div>
            <div className="flex flex-wrap gap-3">
              {leadSources.map(s=>(
                <span key={s} className={`flex items-center gap-2 px-4 py-2 rounded-2xl font-black text-sm border-2 ${DEFAULT_LEAD_SOURCES.includes(s)?'bg-slate-50 border-slate-200 text-slate-600':'bg-purple-50 border-purple-200 text-purple-700'}`}>
                  {s}
                  {!DEFAULT_LEAD_SOURCES.includes(s)&&<button onClick={()=>removeSrc(s)} className="text-purple-300 hover:text-red-500 transition font-black ml-1">✕</button>}
                </span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NovaCRMApp/>);
  </script>
</body>
</html>
