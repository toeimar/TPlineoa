<!DOCTYPE html>
<html lang="th">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --priority-high: #ef4444;
            --priority-high-bg: #fef2f2;
            --priority-high-border: #fecaca;
            --priority-medium: #f59e0b;
            --priority-medium-bg: #fffbeb;
            --priority-medium-border: #fde68a;
            --priority-low: #10b981;
            --priority-low-bg: #ecfdf5;
            --priority-low-border: #a7f3d0;
            --due-today: #ef4444;
            --due-soon: #f59e0b;
            --due-normal: #4f46e5;
            --due-overdue: #7c3aed;
        }

        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-nav { color: #4f46e5; font-weight: 700; background: rgba(79, 70, 229, 0.05); border-radius: 12px; }
        input, select, textarea { font-size: 16px !important; outline: none; }
        .btn-primary { background: #4f46e5; color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .chart-circle { transition: stroke-dashoffset 1s ease-in-out; }

        /* Priority styles */
        .task-high { border-left: 4px solid var(--priority-high) !important; background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%) !important; }
        .task-medium { border-left: 4px solid var(--priority-medium) !important; background: linear-gradient(135deg, #fffdf5 0%, #ffffff 100%) !important; }
        .task-low { border-left: 4px solid var(--priority-low) !important; background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%) !important; }

        /* Due date urgency */
        .due-overdue { background: linear-gradient(135deg, #fdf2f8 0%, #fef2f2 100%) !important; border-color: #f0abfc !important; }
        .due-today { background: linear-gradient(135deg, #fff1f2 0%, #fef2f2 100%) !important; }
        .due-soon { background: linear-gradient(135deg, #fffbeb 0%, #ffffff 100%) !important; }

        /* Calendar day colors by urgency */
        .cal-overdue { background: #fee2e2 !important; color: #ef4444 !important; font-weight: 900; }
        .cal-today-task { background: #fef9c3 !important; }
        .cal-soon-task { background: #e0e7ff !important; }

        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }
        .urgent-pulse { animation: pulse-border 2s infinite; }

        /* Gradient header backgrounds by time of day */
        .morning-bg { background: linear-gradient(135deg, #fef9c3 0%, #fde68a 30%, #fed7aa 100%); }
        .afternoon-bg { background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 30%, #ddd6fe 100%); }
        .evening-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%); }
        .night-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #1e293b 100%); }

        /* Status badge */
        .badge-todo { background:#e0e7ff; color:#4f46e5; }
        .badge-inprogress { background:#fef9c3; color:#d97706; }
        .badge-done { background:#dcfce7; color:#16a34a; }

        /* Smooth card hover */
        .task-card { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,70,229,0.12); }
        .task-card:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Anuphan', sans-serif; color: #4f46e5; font-weight: bold; flex-direction: column; gap: 10px;">
            <div style="width: 40px; height: 40px; border: 4px solid #e0e7ff; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            กำลังโหลดระบบ TeamSync...
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const safeGetLocal = (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } };
        const safeSetLocal = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

        const TG_TOKEN = "8297881671:AAGcSq319AVyjvagyxBDV1STtdRV5WPILKs";
        const DEFAULT_TG_CHAT_ID = "-1003907894437";

        const firebaseConfig = {
            apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
            authDomain: "vitalvibe-c0306.firebaseapp.com",
            projectId: "vitalvibe-c0306",
            storageBucket: "vitalvibe-c0306.firebasestorage.app",
            messagingSenderId: "18887442289",
            appId: "1:18887442289:web:c179b03c6a818fa0ec80d0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Priority helpers ---
        const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
        const sortByPriority = (tasks) => [...tasks].sort((a, b) => {
            const urgA = getUrgencyScore(a.dueDate);
            const urgB = getUrgencyScore(b.dueDate);
            if (urgA !== urgB) return urgA - urgB;
            return (PRIORITY_ORDER[a.priority] ?? 1) - (PRIORITY_ORDER[b.priority] ?? 1);
        });

        const getUrgencyScore = (dueDate) => {
            if (!dueDate) return 99;
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(dueDate); due.setHours(0,0,0,0);
            const diff = Math.floor((due - today) / 86400000);
            if (diff < 0) return 0;   // overdue
            if (diff === 0) return 1; // today
            if (diff <= 2) return 2;  // soon
            return 3;
        };

        const getDueBadge = (dueDate) => {
            if (!dueDate) return null;
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(dueDate); due.setHours(0,0,0,0);
            const diff = Math.floor((due - today) / 86400000);
            if (diff < 0) return { label: `เกินกำหนด ${Math.abs(diff)} วัน`, cls: 'bg-purple-100 text-purple-700', dot: '🔴' };
            if (diff === 0) return { label: 'วันนี้!', cls: 'bg-red-100 text-red-600', dot: '🔥' };
            if (diff <= 2) return { label: `อีก ${diff} วัน`, cls: 'bg-amber-100 text-amber-600', dot: '⚡' };
            return null;
        };

        const getTaskCardClass = (task) => {
            const urgency = getUrgencyScore(task.dueDate);
            if (urgency === 0) return 'task-card due-overdue border border-purple-200';
            if (urgency === 1) return 'task-card due-today border border-red-100';
            if (urgency === 2) return 'task-card due-soon border border-amber-100';
            const p = task.priority || 'medium';
            if (p === 'high') return 'task-card task-high';
            if (p === 'low') return 'task-card task-low';
            return 'task-card task-medium';
        };

        const getPriorityBadgeStyle = (priority) => {
            if (priority === 'high') return 'bg-red-50 text-red-600 border-red-200';
            if (priority === 'low') return 'bg-emerald-50 text-emerald-600 border-emerald-200';
            return 'bg-amber-50 text-amber-600 border-amber-200';
        };

        const getPriorityLabel = (priority) => {
            if (priority === 'high') return '🔴 สูง';
            if (priority === 'low') return '🟢 ต่ำ';
            return '🟡 ปานกลาง';
        };

        // Time-based greeting & bg
        const getTimeContext = () => {
            const h = new Date().getHours();
            if (h >= 5 && h < 12) return { greeting: 'อรุณสวัสดิ์', bgCls: 'morning-bg', textCls: 'text-amber-900', emoji: '🌅' };
            if (h >= 12 && h < 17) return { greeting: 'สวัสดีตอนบ่าย', bgCls: 'afternoon-bg', textCls: 'text-indigo-900', emoji: '☀️' };
            if (h >= 17 && h < 21) return { greeting: 'สวัสดีตอนเย็น', bgCls: 'evening-bg', textCls: 'text-indigo-100', emoji: '🌇' };
            return { greeting: 'ราตรีสวัสดิ์', bgCls: 'night-bg', textCls: 'text-slate-200', emoji: '🌙' };
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error }; }
            render() {
                if (this.state.hasError) {
                    return <div className="p-10 text-red-600 font-bold bg-red-50 h-screen">เกิดข้อผิดพลาดภายในแอป: {this.state.errorInfo?.message}</div>;
                }
                return this.props.children;
            }
        }

        const Icon = ({ name, size = 18, className = "" }) => {
            const paths = {
                dashboard: "M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 16h7v5H3v-5z",
                mytasks: "M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z",
                board: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z",
                calendar: "M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z",
                analytics: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2v-3h2v3zm4 0h-2v-5h2v5z",
                members: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
                plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
                logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
                edit: "M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
                x: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
                chevronRight: "M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z",
                bell: "M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z",
                layers: "M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z"
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><path d={paths[name] || ""} /></svg>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTeamId, setActiveTeamId] = useState(safeGetLocal('ts_v16_active'));
            const [screen, setScreen] = useState('loading'); 
            const [view, setView] = useState('dashboard');
            
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isEditProfileOpen, setIsEditProfileOpen] = useState(false);
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const [notifTab, setNotifTab] = useState('personal');
            const [editingTask, setEditingTask] = useState(null);
            const [viewingTask, setViewingTask] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [defaultTaskDate, setDefaultTaskDate] = useState(new Date().toISOString().split('T')[0]);
            
            const [selectedAssignees, setSelectedAssignees] = useState([]);
            const [testStatus, setTestStatus] = useState('ทดสอบแจ้งเตือน');

            const timeCtx = useMemo(() => getTimeContext(), []);

            // --- Telegram Notifier ---
            const notifyTG = async (title, message, targetChatIds = []) => {
                const ids = [DEFAULT_TG_CHAT_ID, ...targetChatIds];
                const uniqueIds = [...new Set(ids.filter(id => id && id.trim() !== ""))];
                const text = `<b>${title}</b>\n━━━━━━━━━━━━━━\n${message}\n━━━━━━━━━━━━━━\n<i>TeamSync Pro Real-time</i>`;
                for (const chatId of uniqueIds) {
                    try {
                        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' })
                        });
                    } catch (e) { console.error("Telegram error:", e); }
                }
            };

            const handleTestNotif = async () => {
                const inputEl = document.querySelector('input[name="tgChatId"]');
                const targetId = inputEl?.value?.trim() || DEFAULT_TG_CHAT_ID;
                setTestStatus('กำลังส่ง...');
                await notifyTG("🔔 ทดสอบระบบแจ้งเตือน", "การเชื่อมต่อ Telegram ของคุณทำงานได้ปกติ!", [targetId]);
                setTestStatus('✅ ส่งแล้ว');
                setTimeout(() => setTestStatus('ทดสอบแจ้งเตือน'), 3000);
            };

            const handleLogout = async () => {
                const pName = profile?.name || user?.email || "ผู้ใช้";
                notifyTG("🚪 ออกจากระบบ", `👤 <b>${pName}</b> ได้ออกจากระบบแล้ว`);
                await auth.signOut();
            };

            // 1. Auth sync
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        try {
                            const doc = await db.collection('users_profile_v16').doc(u.uid).get();
                            if (doc.exists) {
                                setProfile(doc.data());
                                setScreen(activeTeamId ? 'workspace' : 'hub');
                            } else { setScreen('setup'); }
                        } catch (e) { console.error("Profile Error", e); setScreen('setup'); }
                    } else { setScreen('auth'); }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [activeTeamId]);

            // 2. Data sync
            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId || !user) return;
                const path = `teams_v16/${activeTeamId}`;
                const unsubTasks = db.collection(`${path}/tasks`).onSnapshot(s => {
                    setTasks(s.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error("Tasks Error", err));
                const unsubMembers = db.collection(`${path}/members`).onSnapshot(s => {
                    setMembers(s.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error("Members Error", err));
                db.collection(`${path}/members`).doc(user.uid).set({
                    name: profile?.name || "User", email: user.email, 
                    tgChatId: profile?.tgChatId || "",
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                return () => { unsubTasks(); unsubMembers(); };
            }, [activeTeamId, screen, user, profile]);

            // 3. Scheduled reminders: 08:00 and 19:00
            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId || !profile) return;

                const scheduleReminder = (targetHour, targetMin, reminderKey) => {
                    const now = new Date();
                    const next = new Date();
                    next.setHours(targetHour, targetMin, 0, 0);
                    if (next <= now) next.setDate(next.getDate() + 1);
                    const delay = next - now;

                    return setTimeout(async () => {
                        const todayStr = new Date().toISOString().split('T')[0];
                        const metaRef = db.collection(`teams_v16/${activeTeamId}/meta`).doc(`${reminderKey}_${todayStr}`);
                        try {
                            const doc = await metaRef.get();
                            if (!doc.exists) {
                                await metaRef.set({ reminded: true, by: profile.name, timestamp: firebase.firestore.FieldValue.serverTimestamp() });

                                const snap = await db.collection(`teams_v16/${activeTeamId}/tasks`).get();
                                const freshTasks = snap.docs.map(d => ({id: d.id, ...d.data()}));

                                const localDateStr = new Date().toISOString().split('T')[0];
                                const target2 = new Date(); target2.setDate(target2.getDate() + 2);
                                const t2Str = target2.toISOString().split('T')[0];

                                const dueTodayTasks = freshTasks.filter(t => t.status !== 'done' && t.dueDate === localDateStr);
                                const due2DaysTasks = freshTasks.filter(t => t.status !== 'done' && t.dueDate === t2Str);
                                const overdueTasks = freshTasks.filter(t => {
                                    if (t.status === 'done' || !t.dueDate) return false;
                                    return new Date(t.dueDate) < new Date(localDateStr);
                                });

                                const timeLabel = targetHour === 8 ? '🌅 ตรวจสอบงานประจำเช้า' : '🌙 สรุปงานประจำเย็น';

                                let messages = [];
                                if (overdueTasks.length > 0) {
                                    let msg = overdueTasks.map(t => `‼️ <b>${t.title}</b> (ผู้รับผิดชอบ: ${t.assignees?.join(', ')})`).join('\n');
                                    messages.push(`🚨 งานเกินกำหนด ${overdueTasks.length} รายการ:\n${msg}`);
                                }
                                if (dueTodayTasks.length > 0) {
                                    let msg = dueTodayTasks.map(t => `🔥 <b>${t.title}</b> (ผู้รับผิดชอบ: ${t.assignees?.join(', ')})`).join('\n');
                                    messages.push(`📌 งานที่ต้องเสร็จวันนี้ ${dueTodayTasks.length} รายการ:\n${msg}`);
                                }
                                if (due2DaysTasks.length > 0) {
                                    let msg = due2DaysTasks.map(t => `⏳ <b>${t.title}</b> (ผู้รับผิดชอบ: ${t.assignees?.join(', ')})`).join('\n');
                                    messages.push(`📋 งานกำหนดส่งใน 2 วัน ${due2DaysTasks.length} รายการ:\n${msg}`);
                                }

                                if (messages.length > 0) {
                                    notifyTG(timeLabel, messages.join('\n\n'));
                                } else {
                                    notifyTG(timeLabel, '✅ ไม่มีงานเร่งด่วนในขณะนี้ ทีมงานดีเยี่ยม!');
                                }
                            }
                        } catch(e) { console.error("Scheduled Reminder Error", e); }
                    }, delay);
                };

                const timer8 = scheduleReminder(8, 0, 'sched_morning');
                const timer19 = scheduleReminder(19, 0, 'sched_evening');
                return () => { clearTimeout(timer8); clearTimeout(timer19); };
            }, [activeTeamId, screen, profile]);

            // 4. Daily overdue/today reminder (original logic kept)
            useEffect(() => {
                if (screen !== 'workspace' || !activeTeamId || tasks.length === 0 || !profile) return;
                const checkReminders = async () => {
                    const d = new Date();
                    const localDateStr = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
                    const metaRef = db.collection(`teams_v16/${activeTeamId}/meta`).doc(`reminder_${localDateStr}`);
                    try {
                        const doc = await metaRef.get();
                        if (!doc.exists) {
                            await metaRef.set({ reminded: true, by: profile.name, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                            const targetDate2Days = new Date(); targetDate2Days.setDate(targetDate2Days.getDate() + 2);
                            const target2DaysStr = targetDate2Days.getFullYear() + "-" + String(targetDate2Days.getMonth() + 1).padStart(2, '0') + "-" + String(targetDate2Days.getDate()).padStart(2, '0');
                            const dueTodayTasks = tasks.filter(t => t.status !== 'done' && t.dueDate === localDateStr);
                            const due2DaysTasks = tasks.filter(t => t.status !== 'done' && t.dueDate === target2DaysStr);
                            if (dueTodayTasks.length > 0) {
                                let msg = dueTodayTasks.map(t => `- <b>${t.title}</b> (ผู้รับผิดชอบ: ${t.assignees?.join(', ')})`).join('\n');
                                notifyTG("🚨 กำหนดส่งงานวันนี้!", `รายชื่องานที่ต้องทำให้เสร็จภายในวันนี้:\n${msg}`);
                            }
                            if (due2DaysTasks.length > 0) {
                                let msg = due2DaysTasks.map(t => `- <b>${t.title}</b> (ผู้รับผิดชอบ: ${t.assignees?.join(', ')})`).join('\n');
                                notifyTG("⏳ เตือนกำหนดส่งงาน (ล่วงหน้า 2 วัน)", `รายชื่องานที่จะถึงกำหนดในอีก 2 วัน:\n${msg}`);
                            }
                        }
                    } catch(e) { console.error("Reminder Error", e); }
                };
                const timer = setTimeout(checkReminders, 5000);
                return () => clearTimeout(timer);
            }, [activeTeamId, screen, tasks.length, profile]);

            // --- Handlers ---
            const handleAuth = async (e) => {
                e.preventDefault();
                const em = e.target.email.value, pw = e.target.password.value;
                try {
                    await auth.setPersistence('local');
                    await auth.signInWithEmailAndPassword(em, pw);
                    notifyTG("🔑 เข้าสู่ระบบ", `👤 ผู้ใช้ <b>${em}</b> ได้เข้าสู่ระบบสำเร็จ`);
                } catch (err) {
                    try { 
                        await auth.setPersistence('local');
                        await auth.createUserWithEmailAndPassword(em, pw); 
                        notifyTG("🎉 สมัครสมาชิกใหม่!", `👤 ผู้ใช้ <b>${em}</b> ได้ลงทะเบียนและเข้าสู่ระบบครั้งแรก!`);
                    } catch (e2) { alert("Error: " + e2.message); }
                }
            };

            const handleProfileSave = async (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                const tgChatId = e.target.tgChatId.value.trim();
                if (name && user) {
                    const data = { name, tgChatId, email: user.email, teams: profile?.teams || [] };
                    await db.collection('users_profile_v16').doc(user.uid).set(data, { merge: true });
                    setProfile(data);
                    setIsEditProfileOpen(false);
                    notifyTG("⚙️ อัปเดตข้อมูลผู้ใช้", `👤 <b>${name}</b> ได้ทำการอัปเดตโปรไฟล์/การแจ้งเตือนในระบบ`);
                    if (screen === 'setup') setScreen('hub');
                }
            };

            const joinTeam = async (e) => {
                e.preventDefault();
                const tid = e.target.teamId.value.trim().toUpperCase();
                if (tid && profile) {
                    const updated = [...new Set([...(profile.teams || []), tid])];
                    await db.collection('users_profile_v16').doc(user.uid).update({ teams: updated });
                    setProfile({ ...profile, teams: updated });
                    setActiveTeamId(tid);
                    safeSetLocal('ts_v16_active', tid);
                    setScreen('workspace');
                    notifyTG("👋 สมาชิกใหม่เข้าร่วมทีม!", `👤 <b>${profile.name}</b> เข้าร่วมทีม <b>#${tid}</b>`);
                }
            };

            const saveTask = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const taskData = {
                    title: fd.get('title'),
                    description: fd.get('description') || "",
                    dueDate: fd.get('dueDate'),
                    priority: fd.get('priority') || 'medium',
                    status: fd.get('status') || 'todo',
                    assignees: selectedAssignees.length > 0 ? selectedAssignees : [profile?.name || "User"]
                };
                let personalChatIds = [];
                if (!taskData.assignees.includes('ทุกคน')) {
                    taskData.assignees.forEach(name => {
                        const m = members.find(member => member.name === name);
                        if (m && m.tgChatId) personalChatIds.push(m.tgChatId);
                    });
                }
                const path = `teams_v16/${activeTeamId}/tasks`;
                if (editingTask) {
                    await db.collection(path).doc(editingTask.id).update(taskData);
                    notifyTG("📝 อัปเดตงาน", `📌 <b>งาน:</b> ${taskData.title}\n👤 <b>โดย:</b> ${profile.name}\n📊 <b>สถานะ:</b> ${taskData.status.toUpperCase()}`, personalChatIds);
                } else {
                    await db.collection(path).add({ ...taskData, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    notifyTG("🚀 มีงานใหม่!", `📌 <b>งาน:</b> ${taskData.title}\n👥 <b>มอบหมาย:</b> ${taskData.assignees.join(', ')}\n📅 <b>กำหนด:</b> ${taskData.dueDate}`, personalChatIds);
                }
                setIsTaskModalOpen(false);
                setEditingTask(null);
            };

            // NEW: ฟังก์ชันอัปเดตสถานะงานด่วน (Quick Status Update)
            const quickUpdateStatus = async (task, newStatus) => {
                if (task.status === newStatus) return;
                try {
                    await db.collection(`teams_v16/${activeTeamId}/tasks`).doc(task.id).update({ status: newStatus });
                    setViewingTask(prev => ({ ...prev, status: newStatus }));
                    
                    let personalChatIds = [];
                    if (task.assignees && !task.assignees.includes('ทุกคน')) {
                        task.assignees.forEach(name => {
                            const m = members.find(member => member.name === name);
                            if (m && m.tgChatId) personalChatIds.push(m.tgChatId);
                        });
                    }
                    notifyTG("🔄 เปลี่ยนสถานะงาน", `📌 <b>งาน:</b> ${task.title}\n👤 <b>โดย:</b> ${profile.name}\n📊 <b>สถานะใหม่:</b> ${newStatus.toUpperCase()}`, personalChatIds);
                } catch (e) {
                    console.error("Error updating status:", e);
                }
            };

            const deleteTask = async (task) => {
                if (confirm("ยืนยันลบงานนี้?")) {
                    await db.collection(`teams_v16/${activeTeamId}/tasks`).doc(task.id).delete();
                    setViewingTask(null);
                    let personalChatIds = [];
                    if (task.assignees && !task.assignees.includes('ทุกคน')) {
                        task.assignees.forEach(name => {
                            const m = members.find(member => member.name === name);
                            if (m && m.tgChatId) personalChatIds.push(m.tgChatId);
                        });
                    }
                    notifyTG("🗑️ งานถูกลบ", `❌ <b>งาน:</b> ${task.title}\n👤 ลบโดย: ${profile.name}`, personalChatIds);
                }
            };

            const removeMember = async (m) => {
                const isSelf = m.id === user.uid;
                if (confirm(isSelf ? "ต้องการออกจากทีมนี้?" : `ลบ ${m.name}?`)) {
                    if (isSelf) {
                        const updated = profile.teams.filter(t => t !== activeTeamId);
                        await db.collection('users_profile_v16').doc(user.uid).update({ teams: updated });
                        setProfile({ ...profile, teams: updated });
                        setScreen('hub');
                    }
                    await db.collection(`teams_v16/${activeTeamId}/members`).doc(m.id).delete();
                    notifyTG("🚪 สมาชิกออกจากทีม", `👤 <b>${m.name}</b> ได้ออกจากกลุ่มแล้ว`);
                }
            };

            // --- Computations ---
            const stats = useMemo(() => {
                const t = tasks || [], total = t.length, done = t.filter(x => x.status === 'done').length;
                const workload = (members || []).map(m => ({
                    name: m.name, count: t.filter(x => x.assignees?.includes(m.name) || x.assignees?.includes('ทุกคน')).length
                })).sort((a,b) => b.count - a.count);
                return { total, done, rate: total > 0 ? Math.round((done / total) * 100) : 0, workload };
            }, [tasks, members]);

            const myPersonal = sortByPriority(
                (tasks || []).filter(t => t.status !== 'done' && t.assignees?.includes(profile?.name) && !t.assignees?.includes('ทุกคน'))
            );
            const groupShared = sortByPriority(
                (tasks || []).filter(t => t.status !== 'done' && t.assignees?.includes('ทุกคน'))
            );
            const pendingCount = (tasks || []).filter(t => t.status !== 'done' && (t.assignees?.includes(profile?.name) || t.assignees?.includes('ทุกคน'))).length;

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-indigo-600 text-xl"><div className="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mr-3"></div> TeamSync Linking...</div>;

            // --- Screens ---
            if (screen === 'auth') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center animate-in">
                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-6 shadow-xl rotate-3">T</div>
                        <h1 className="text-2xl font-black mb-8 tracking-tight">TeamSync Pro</h1>
                        <form onSubmit={handleAuth} className="space-y-3">
                            <input name="email" required placeholder="Email" className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold" />
                            <input name="password" required type="password" placeholder="Password" className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold" />
                            <button className="w-full p-4 btn-primary rounded-xl font-black shadow-lg mt-4 uppercase text-xs">Login / Join</button>
                        </form>
                    </div>
                </div>
            );

            if (screen === 'setup') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center animate-in">
                        <h1 className="text-2xl font-black mb-6 text-indigo-600">ตั้งค่าโปรไฟล์</h1>
                        <form onSubmit={handleProfileSave} className="space-y-4">
                            <input name="username" required defaultValue={profile?.name || ""} placeholder="ชื่อเล่นหรือชื่อจริง..." className="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold text-lg outline-none focus:ring-4 focus:ring-indigo-100 transition-all" />
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic block text-left px-2">CHAT ID (OPTIONAL)</label>
                                <div className="flex gap-2">
                                    <input name="tgChatId" defaultValue={profile?.tgChatId || ""} className="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold text-sm text-slate-500 outline-none focus:ring-4 focus:ring-indigo-100 transition-all" />
                                    <button type="button" onClick={handleTestNotif} className="px-4 bg-indigo-50 text-indigo-600 rounded-2xl font-black text-[10px] active:scale-95 transition-all whitespace-nowrap hover:bg-indigo-100 border border-indigo-100">{testStatus}</button>
                                </div>
                            </div>
                            <button className="w-full p-4 btn-primary rounded-2xl font-black shadow-xl uppercase text-xs mt-2">เริ่มต้นใช้งาน</button>
                        </form>
                    </div>
                </div>
            );

            const EditProfileModal = () => isEditProfileOpen ? (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white p-8 rounded-[3rem] w-full max-w-sm text-center animate-in relative shadow-2xl">
                        <button type="button" onClick={() => setIsEditProfileOpen(false)} className="absolute top-6 right-6 text-slate-400 active:scale-90"><Icon name="x" size={20}/></button>
                        <h2 className="text-xl font-black mb-6 text-indigo-600">แก้ไขโปรไฟล์ & แจ้งเตือน</h2>
                        <form onSubmit={handleProfileSave} className="space-y-4">
                            <input name="username" required defaultValue={profile?.name || ""} placeholder="ชื่อเล่นหรือชื่อจริง..." className="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold text-lg outline-none focus:ring-4 focus:ring-indigo-100 transition-all" />
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic block text-left px-2">CHAT ID (OPTIONAL)</label>
                                <div className="flex gap-2">
                                    <input name="tgChatId" defaultValue={profile?.tgChatId || ""} className="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold text-sm text-slate-500 outline-none focus:ring-4 focus:ring-indigo-100 transition-all" />
                                    <button type="button" onClick={handleTestNotif} className="px-4 bg-indigo-50 text-indigo-600 rounded-2xl font-black text-[10px] active:scale-95 transition-all whitespace-nowrap hover:bg-indigo-100 border border-indigo-100">{testStatus}</button>
                                </div>
                            </div>
                            <button className="w-full p-4 btn-primary rounded-2xl font-black shadow-xl uppercase text-xs mt-2">บันทึกข้อมูล</button>
                        </form>
                    </div>
                </div>
            ) : null;

            if (screen === 'hub') return (
                <div className="min-h-screen p-5 bg-slate-50 animate-in max-w-md mx-auto">
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setIsEditProfileOpen(true)}>
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl uppercase group-hover:scale-105 transition-all">{(profile?.name || "U").substring(0,2)}</div>
                            <div>
                                <h1 className="text-xl font-black italic group-hover:text-indigo-600 transition-all">สวัสดี, {profile?.name}</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold flex items-center gap-1"><Icon name="edit" size={10}/> แก้ไขโปรไฟล์ / แจ้งเตือน</p>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="p-2 text-red-500 bg-white rounded-xl shadow-sm border border-red-50"><Icon name="logout" size={18}/></button>
                    </header>
                    <div className="bg-white p-7 rounded-[2.5rem] shadow-sm border mb-8 text-center">
                        <h2 className="text-sm font-black mb-4 flex items-center justify-center gap-2 text-indigo-600"><Icon name="plus" size={16}/> สร้าง/เข้าร่วมทีมใหม่</h2>
                        <form onSubmit={joinTeam} className="flex gap-2">
                            <input name="teamId" required placeholder="TEAM-ID" className="flex-1 p-3.5 bg-slate-50 border-none rounded-xl font-bold uppercase outline-none" />
                            <button className="px-5 btn-primary rounded-xl font-black">GO</button>
                        </form>
                    </div>
                    <div className="space-y-3">
                        <h2 className="text-[10px] font-black px-4 text-slate-400 uppercase tracking-widest italic">ทีมที่สังกัด ({profile?.teams?.length || 0})</h2>
                        {profile?.teams?.map(tid => (
                            <div key={tid} onClick={() => { setActiveTeamId(tid); safeSetLocal('ts_v16_active', tid); setScreen('workspace'); setView('dashboard'); }} className="bg-white p-5 rounded-2xl shadow-sm border border-transparent hover:border-indigo-100 active:scale-95 transition-all flex justify-between items-center group cursor-pointer">
                                <div className="flex items-center gap-4"><div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center font-black group-hover:bg-indigo-600 group-hover:text-white transition-all">#</div><p className="font-black text-lg">{tid}</p></div>
                                <Icon name="chevronRight" className="text-slate-200" />
                            </div>
                        ))}
                    </div>
                    <EditProfileModal />
                </div>
            );

            // ===== WORKSPACE =====
            return (
                <div className="min-h-screen pb-24 md:pl-64 md:pb-0 animate-in">
                    <aside className="hidden md:flex flex-col fixed inset-y-0 left-0 w-64 bg-white border-r p-8 z-30">
                        <div className="flex items-center gap-2 mb-10"><div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black">T</div><span className="font-black text-xl tracking-tight italic">TeamSync</span></div>
                        <nav className="flex-1 space-y-1">
                            {['dashboard', 'mytasks', 'board', 'calendar', 'analytics', 'members'].map(m => (
                                <button key={m} onClick={() => setView(m)} className={`flex items-center gap-3 w-full p-3.5 rounded-xl text-sm font-bold transition-all ${view === m ? 'active-nav bg-indigo-50 shadow-sm text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={m} size={18}/> {m.charAt(0).toUpperCase() + m.slice(1)}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setScreen('hub')} className="mt-auto p-4 bg-slate-900 rounded-xl text-white text-[10px] font-black uppercase text-center tracking-[0.2em] shadow-lg active:scale-95 transition-all">สลับทีมงาน</button>
                    </aside>

                    <nav className="md:hidden fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-2 pb-safe z-40 shadow-xl">
                        {['dashboard', 'mytasks', 'board', 'members'].map(m => (
                            <button key={m} onClick={() => setView(m)} className={`p-3 rounded-xl transition-all ${view === m ? 'text-indigo-600 bg-indigo-50' : 'text-slate-300'}`}>
                                <Icon name={m} size={22}/>
                            </button>
                        ))}
                        <button onClick={() => setScreen('hub')} className="p-3 text-slate-300 active:scale-90 transition-all"><Icon name="layers" size={22}/></button>
                    </nav>

                    <main className="p-4 md:p-12 max-w-4xl mx-auto space-y-6 pb-12">
                        {/* Time-based colored header */}
                        <header className={`rounded-[2rem] p-6 mb-2 ${timeCtx.bgCls}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className={`text-xs font-black uppercase tracking-widest opacity-70 ${timeCtx.textCls}`}>{timeCtx.emoji} {timeCtx.greeting}</p>
                                    <h2 className={`text-2xl font-black leading-none mt-1 flex items-center gap-3 italic cursor-pointer ${timeCtx.textCls}`} onClick={() => setIsEditProfileOpen(true)}>
                                        คุณ{profile?.name} <Icon name="edit" size={14} className="opacity-40"/>
                                    </h2>
                                    <p className={`font-bold text-[10px] uppercase tracking-widest mt-2 opacity-60 ${timeCtx.textCls}`}>Team: #{activeTeamId} • {view}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setIsNotifOpen(true)} className="relative w-12 h-12 bg-white/30 backdrop-blur-sm rounded-2xl flex items-center justify-center border border-white/40 active:scale-90 transition-all">
                                        <Icon name="bell" size={20} className={timeCtx.textCls}/>
                                        {pendingCount > 0 && <span className="absolute top-2 right-3 w-3 h-3 bg-red-500 rounded-full border-2 border-white animate-pulse"></span>}
                                    </button>
                                    <button onClick={() => { setEditingTask(null); setSelectedAssignees([profile?.name]); setDefaultTaskDate(new Date().toISOString().split('T')[0]); setIsTaskModalOpen(true); }} className="w-12 h-12 bg-white/30 backdrop-blur-sm rounded-2xl flex items-center justify-center border border-white/40 active:scale-90 transition-all">
                                        <Icon name="plus" size={24} className={timeCtx.textCls}/>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-indigo-600 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">ทั้งหมด</p><p className="text-3xl font-black leading-none">{tasks.length}</p></div>
                                    <div className="bg-emerald-500 p-5 rounded-[2rem] text-white shadow-lg"><p className="text-[9px] font-bold opacity-70 uppercase">สำเร็จ</p><p className="text-3xl font-black leading-none">{stats.done}</p></div>
                                </div>
                                <div className="bg-white p-7 rounded-[2.5rem] border flex items-center justify-between shadow-sm">
                                    <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Team Success</p><p className="text-5xl font-black text-indigo-600 mt-2 tracking-tighter">{stats.rate}%</p></div>
                                    <div className="w-24 h-12 bg-indigo-50 rounded-xl relative overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-1000" style={{width: `${stats.rate}%`}}></div></div>
                                </div>

                                {/* Urgent tasks highlight on dashboard */}
                                {(() => {
                                    const urgentTasks = sortByPriority(tasks.filter(t => t.status !== 'done' && getUrgencyScore(t.dueDate) <= 1));
                                    if (urgentTasks.length === 0) return null;
                                    return (
                                        <div className="bg-red-50 border border-red-100 p-5 rounded-[2rem]">
                                            <h3 className="font-black text-xs mb-3 text-red-600 uppercase tracking-widest flex items-center gap-2">🚨 งานเร่งด่วน ({urgentTasks.length})</h3>
                                            <div className="space-y-2">
                                                {urgentTasks.map(t => {
                                                    const badge = getDueBadge(t.dueDate);
                                                    return (
                                                        <div key={t.id} onClick={() => setViewingTask(t)} className="p-3 bg-white rounded-xl flex justify-between items-center cursor-pointer hover:bg-red-50 border border-red-100 urgent-pulse">
                                                            <div><p className="font-bold text-sm leading-none">{t.title}</p><p className="text-[9px] text-slate-400 font-bold mt-1">{t.assignees?.join(', ')}</p></div>
                                                            {badge && <span className={`text-[9px] font-black px-2 py-1 rounded-lg ${badge.cls}`}>{badge.dot} {badge.label}</span>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })()}

                                <div className="bg-white p-7 rounded-[2.5rem] border shadow-sm">
                                    <h3 className="font-black text-xs mb-4 uppercase text-slate-300 italic tracking-widest">Latest Update</h3>
                                    <div className="space-y-3">
                                        {tasks.slice(-3).reverse().map(t => {
                                            const badge = getDueBadge(t.dueDate);
                                            return (

                                                        else setSelectedAssignees(prev => prev.includes(m.name) ? prev.filter(a => a !== m.name) : [...prev, m.name]);
                                                    }} className={`px-3 py-2 rounded-xl text-xs font-bold transition-all border ${selectedAssignees.includes(m.name) && !selectedAssignees.includes('ทุกคน') ? 'bg-indigo-100 text-indigo-600 border-indigo-200' : 'bg-white text-slate-500'}`}>{selectedAssignees.includes(m.name) && !selectedAssignees.includes('ทุกคน') ? '✓ ' : ''}{m.name}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase italic">Due Date</label>
                                                <input name="dueDate" type="date" required defaultValue={editingTask?.dueDate || defaultTaskDate} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase italic">Priority</label>
                                                <select name="priority" defaultValue={editingTask?.priority || 'medium'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none">
                                                    <option value="low">🟢 Low</option><option value="medium">🟡 Medium</option><option value="high">🔴 High</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase italic">Current Status</label>
                                            <select name="status" defaultValue={editingTask?.status || 'todo'} className="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-xs outline-none">
                                                <option value="todo">📋 To Do</option><option value="in-progress">⚡ Doing</option><option value="done">✅ Done</option>
                                            </select>
                                        </div>
                                        <button disabled={selectedAssignees.length === 0} className={`w-full p-5 rounded-[2rem] font-black shadow-xl mt-6 uppercase text-xs tracking-[0.2em] transition-all ${selectedAssignees.length === 0 ? 'bg-slate-100 text-slate-300' : 'btn-primary active:scale-95 shadow-indigo-100'}`}>บันทึกภารกิจ</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NEW: Modal แก้ไขปุ่มปิด และเพิ่มฟังก์ชันอัปเดตสถานะด่วน */}
                    {viewingTask && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] md:rounded-[3rem] shadow-2xl p-8 md:p-10 relative animate-in max-h-[85vh] overflow-y-auto no-scrollbar flex flex-col">
                                <button onClick={() => setViewingTask(null)} className="absolute top-6 right-6 p-2 text-slate-500 bg-white/80 shadow-sm rounded-full backdrop-blur-md active:scale-90 z-50 hover:bg-slate-100 transition-all"><Icon name="x" size={20}/></button>
                                {(() => {
                                    const badge = getDueBadge(viewingTask.dueDate);
                                    const urgency = getUrgencyScore(viewingTask.dueDate);
                                    const urgBg = urgency === 0 ? 'from-purple-50 to-white border-purple-100' : urgency === 1 ? 'from-red-50 to-white border-red-100' : 'from-slate-50 to-white border-slate-100';
                                    return (
                                        <>
                                            <div className={`absolute inset-0 rounded-t-[3rem] md:rounded-[3rem] bg-gradient-to-b ${urgBg} opacity-50 pointer-events-none`}></div>
                                            <div className="relative z-10 pt-2">
                                                <div className="flex items-center gap-2 mb-6 flex-wrap">
                                                    <span className={`px-3 py-1 rounded-lg text-[9px] font-black border ${getPriorityBadgeStyle(viewingTask.priority)}`}>{getPriorityLabel(viewingTask.priority)} PRIORITY</span>
                                                    {badge && <span className={`px-3 py-1 rounded-lg text-[9px] font-black ${badge.cls}`}>{badge.dot} {badge.label}</span>}
                                                    <span className={`px-3 py-1 rounded-lg text-[9px] font-black ${viewingTask.status === 'done' ? 'badge-done' : viewingTask.status === 'in-progress' ? 'badge-inprogress' : 'badge-todo'}`}>{viewingTask.status === 'done' ? '✅ Done' : viewingTask.status === 'in-progress' ? '⚡ In Progress' : '📋 To Do'}</span>
                                                </div>
                                                <h3 className="text-3xl font-black text-slate-800 mb-6 leading-tight tracking-tight italic">{viewingTask.title}</h3>
                                                <p className="text-sm font-bold text-slate-500 mb-8 whitespace-pre-wrap leading-relaxed">{viewingTask.description || 'ไม่มีรายละเอียดเพิ่มเติม'}</p>
                                                
                                                <div className="space-y-4 mb-10 text-left">
                                                    <div className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100"><div className="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-black text-lg uppercase shadow-lg shrink-0">{viewingTask.assignees?.[0]?.substring(0,2) || "?"}</div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Assignees</p><p className="font-bold text-slate-800 text-sm mt-1">{viewingTask.assignees?.join(', ')}</p></div></div>
                                                    <div className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100"><div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-indigo-600 shadow-sm shrink-0"><Icon name="calendar" size={24}/></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Due Date</p><p className="font-bold text-slate-800 text-lg mt-1">{viewingTask.dueDate}</p></div></div>
                                                    
                                                    {/* NEW: เมนูอัปเดตสถานะงานด่วน โดยไม่ต้องกดเข้าหน้าแก้ไข */}
                                                    <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100 mt-4">
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">เปลี่ยนสถานะด่วน</p>
                                                        <div className="flex gap-2">
                                                            <button onClick={(e) => { e.stopPropagation(); quickUpdateStatus(viewingTask, 'todo'); }} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all shadow-sm ${viewingTask.status === 'todo' ? 'bg-indigo-600 text-white ring-2 ring-indigo-200' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>📋 To Do</button>
                                                            <button onClick={(e) => { e.stopPropagation(); quickUpdateStatus(viewingTask, 'in-progress'); }} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all shadow-sm ${viewingTask.status === 'in-progress' ? 'bg-amber-500 text-white ring-2 ring-amber-200' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>⚡ Doing</button>
                                                            <button onClick={(e) => { e.stopPropagation(); quickUpdateStatus(viewingTask, 'done'); }} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all shadow-sm ${viewingTask.status === 'done' ? 'bg-emerald-500 text-white ring-2 ring-emerald-200' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>✅ Done</button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="flex gap-3 mt-auto pt-4 border-t border-slate-100">
                                                    <button onClick={() => deleteTask(viewingTask)} className="p-5 bg-red-50 text-red-500 rounded-2xl active:scale-95 shadow-inner border border-red-100"><Icon name="trash" size={24}/></button>
                                                    <button onClick={() => { setEditingTask(viewingTask); setSelectedAssignees(viewingTask.assignees); setViewingTask(null); setIsTaskModalOpen(true); }} className="flex-1 p-5 bg-slate-900 text-white rounded-[2.5rem] font-black shadow-2xl active:scale-95 uppercase text-xs tracking-widest italic">แก้ไขรายละเอียด</button>
                                                </div>
                                            </div>
                                        </>
                                    );
                                })()}
                            </div>
                        </div>
                    )}
                    
                    <EditProfileModal />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
